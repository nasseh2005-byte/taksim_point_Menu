<!DOCTYPE html>
<html lang="ar" dir="rtl" x-data="taksimApp()" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taksim Point Menu | منيو تقسيم بوينت</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #D4AF37; --dark: #0a0a0a; --card: #141414; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--dark); color: white; overflow-x: hidden; }
        [x-cloak] { display: none !important; }
        
        /* تأثيرات النصوص والزجاج */
        .gold-text { color: var(--gold); }
        .gold-border { border-color: rgba(212, 175, 55, 0.3); }
        .glass-nav { background: rgba(10, 10, 10, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(212, 175, 55, 0.2); }
        .glass-card { background: var(--card); border: 1px solid rgba(255,255,255,0.05); }
        
        /* إخفاء شريط التمرير */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* حركات الكاروسيل */
        .carousel-track { display: flex; transition: transform 0.8s ease-in-out; }
        .carousel-slide { min-width: 100%; }
        
        /* شريط التنقل السفلي */
        .bottom-nav { background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(10px); border-top: 1px solid var(--gold); }
        .nav-btn.active { color: var(--dark); background: var(--gold); font-weight: bold; border-radius: 9999px; }
    </style>
</head>
<body class="pb-24" x-init="initApp()">

    <nav class="glass-nav sticky top-0 z-50 px-4 py-3 flex justify-between items-center">
        <div class="flex items-center">
             <img src="https://via.placeholder.com/120x40/000/D4AF37?text=TAKSIM+POINT" alt="Taksim Logo" class="h-8">
        </div>
        
        <div class="flex items-center gap-3">
            <select x-model="currentLang" @change="loadData()" class="bg-black border border-yellow-600/50 text-gold text-xs rounded-full px-2 py-1 outline-none">
                <template x-for="(name, code) in langNames" :key="code">
                    <option :value="code" x-text="name"></option>
                </template>
            </select>
            
            <button @click="showFilter = true" x-show="view === 'all'" class="p-1.5 rounded-full border border-gray-600 text-gray-300 hover:text-gold hover:border-gold">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"></path></svg>
            </button>
        </div>
    </nav>

    <div x-show="view === 'home'" x-cloak>
        
        <div class="relative w-full h-[400px] overflow-hidden bg-black">
            <div class="carousel-track h-full" :style="`transform: translateX(${heroIndex * 100}%)`">
                <template x-for="item in featuredItems" :key="item.id">
                    <div class="carousel-slide relative h-full">
                        <img :src="item.image" class="w-full h-full object-cover opacity-70">
                        <div class="absolute inset-0 bg-gradient-to-t from-black via-black/40 to-transparent flex flex-col justify-end p-6">
                            <span class="text-gold font-bold text-xs bg-black/50 w-max px-2 py-1 rounded mb-2 border gold-border">استمتع بوجباتنا المميزة</span>
                            <h2 class="text-3xl font-black mb-1" x-text="item.name"></h2>
                            <p class="text-sm text-gray-300 line-clamp-2 mb-2" x-text="item.description"></p>
                            <span class="text-xl font-bold text-gold" x-text="item.price + ' SR'"></span>
                        </div>
                    </div>
                </template>
            </div>
            <div class="absolute bottom-4 left-0 right-0 flex justify-center gap-2 z-10">
                <template x-for="(item, index) in featuredItems" :key="index">
                    <button class="w-2 h-2 rounded-full transition-all" :class="heroIndex === index ? 'bg-gold w-4' : 'bg-white/50'" @click="heroIndex = index"></button>
                </template>
            </div>
        </div>

        <div class="px-4 mt-8">
            <h2 class="text-2xl font-bold mb-4 flex items-center gap-2">
                <span class="w-2 h-6 bg-gold rounded"></span> فطورك من تقسيم بوينت
            </h2>
            
            <div class="grid grid-cols-2 gap-3 mb-6">
                <div class="relative h-40 rounded-2xl overflow-hidden border gold-border">
                    <img src="https://images.unsplash.com/photo-1533089860892-a7c6f0a88666?w=500" class="w-full h-full object-cover opacity-60">
                    <div class="absolute inset-0 p-4 flex flex-col justify-end bg-gradient-to-t from-black/80">
                        <h3 class="font-bold text-lg">فطور الملكي 👑</h3>
                    </div>
                </div>
                <div class="relative h-40 rounded-2xl overflow-hidden border gold-border">
                    <img src="https://images.unsplash.com/photo-1525351484163-7529414344d8?w=500" class="w-full h-full object-cover opacity-60">
                    <div class="absolute inset-0 p-4 flex flex-col justify-end bg-gradient-to-t from-black/80">
                        <h3 class="font-bold text-lg">فطور تقسيم 🥯</h3>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-4 gap-2 mb-10">
                <template x-for="cat in ['الفطور', 'البيض', 'الفول والفلافل', 'مقبلات']">
                    <button @click="goToSection(cat)" class="glass-card rounded-xl p-2 flex flex-col items-center justify-center gap-2 hover:bg-gold/10">
                        <div class="w-8 h-8 rounded-full bg-gold/20 flex items-center justify-center text-sm">🍳</div>
                        <span class="text-[10px] font-bold text-center" x-text="cat"></span>
                    </button>
                </template>
            </div>

            <h2 class="text-2xl font-bold mb-4 flex items-center gap-2">
                <span class="w-2 h-6 bg-gold rounded"></span> غداءك من تقسيم بوينت !!
            </h2>
            <div class="flex gap-4 overflow-x-auto no-scrollbar snap-x mb-10 pb-4">
                <template x-for="item in lunchItems" :key="item.id">
                    <div class="min-w-[220px] snap-center glass-card rounded-2xl overflow-hidden">
                        <img :src="item.image" class="w-full h-32 object-cover">
                        <div class="p-3">
                            <h4 class="font-bold text-sm mb-1 truncate" x-text="item.name"></h4>
                            <div class="flex justify-between items-center mt-2">
                                <span class="text-gold font-bold text-sm" x-text="item.price + ' SR'"></span>
                                <span class="text-[10px] text-gray-500" x-text="item.category"></span>
                            </div>
                        </div>
                    </div>
                </template>
            </div>

            <h2 class="text-xl font-bold mb-1 text-gold">ابتكارات تقسيم.. لحظات السعادة ✨</h2>
            <p class="text-[10px] text-gray-400 mb-4">نحن لا نقدم مجرد حلويات، نحن نصنع ذكرى تدوم</p>
            <div class="flex gap-3 overflow-x-auto no-scrollbar snap-x mb-8">
                <template x-for="item in sweetItems" :key="item.id">
                    <div class="min-w-[140px] snap-center glass-card rounded-2xl p-3 text-center border-t border-gold/30">
                        <img :src="item.image" class="w-16 h-16 rounded-full mx-auto mb-2 object-cover border-2 border-gold/50">
                        <h4 class="font-bold text-xs mb-1 truncate" x-text="item.name"></h4>
                        <span class="text-gold text-xs" x-text="item.price + ' SR'"></span>
                    </div>
                </template>
            </div>
        </div>
    </div>

    <div x-show="view === 'all'" x-cloak class="px-4 py-6">
        <template x-for="category in categoriesList" :key="category">
            <div class="mb-10" :id="'section-' + category">
                <h2 class="text-2xl font-black mb-4 gold-text border-b border-gray-800 pb-2" x-text="category"></h2>
                
                <div class="flex flex-col gap-4">
                    <template x-for="item in getItemsByCategory(category)" :key="item.id">
                        <div class="flex glass-card rounded-2xl p-2 gap-3 relative">
                            <img :src="item.image" class="w-24 h-24 rounded-xl object-cover">
                            <div class="flex flex-col justify-center flex-1">
                                <h3 class="font-bold text-sm mb-1 pr-6" x-text="item.name"></h3>
                                <p class="text-[10px] text-gray-400 line-clamp-2 mb-2 leading-relaxed" x-text="item.description"></p>
                                <div class="flex justify-between items-center">
                                    <span class="text-gold font-bold text-sm" x-text="item.price + ' SR'"></span>
                                    <span class="text-[9px] text-gray-500 bg-black/50 px-2 py-0.5 rounded" x-text="item.calories + ' kcal'"></span>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </template>
    </div>

    <div x-show="showFilter" x-cloak class="fixed inset-0 z-[100] bg-black/90 flex justify-start">
        <div @click.away="showFilter = false" class="w-3/4 max-w-sm bg-[#111] h-full p-6 overflow-y-auto border-l border-gold/20">
            <h3 class="text-xl font-bold gold-text mb-6">أقسام المنيو</h3>
            <div class="flex flex-col gap-3">
                <template x-for="cat in categoriesList" :key="cat">
                    <button @click="goToSection(cat)" class="text-right py-2 text-sm border-b border-gray-800 hover:text-gold transition-colors" x-text="cat"></button>
                </template>
            </div>
            <button @click="showFilter = false" class="mt-8 w-full bg-gold text-black font-bold py-2 rounded-xl">إغلاق</button>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bottom-nav px-6 py-3 flex justify-center gap-6 z-40">
        <button @click="view = 'home'; window.scrollTo(0,0)" :class="view === 'home' ? 'active px-6' : 'text-gray-400'" class="nav-btn py-2 px-2 transition-all flex items-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
            <span class="text-sm" x-show="view === 'home'">الرئيسية</span>
        </button>
        <button @click="view = 'all'; window.scrollTo(0,0)" :class="view === 'all' ? 'active px-6' : 'text-gray-400'" class="nav-btn py-2 px-2 transition-all flex items-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
            <span class="text-sm" x-show="view === 'all'">القائمة</span>
        </button>
    </div>

    <script>
        function taksimApp() {
            return {
                view: 'home',
                showFilter: false,
                currentLang: 'ar',
                heroIndex: 0,
                menuItems: [],
                featuredItems: [],
                lunchItems: [],
                sweetItems: [],
                categoriesList: [],
                heroInterval: null,

                langNames: {
                    ar: 'العربية', en: 'English', tr: 'Türkçe', es: 'Español', 
                    ru: 'Русский', ur: 'اردو', hi: 'हिन्दी', fr: 'Français', 
                    du: 'Deutsch', zn: '中文', ja: '日本語', ko: '한국어', 
                    it: 'Italiano', vi: 'Tiếng Việt', th: 'ไทย', id: 'Bahasa Indonesia'
                },

                langLinks: {
                    ar: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOkdnVoo1JZxM3ZIw11KaQno61mag50VxycvqZ-kY6OC0oZ3tef1gJJYAnStaLlLsmaLvzIlR6KKRK/pub?gid=2026156602&single=true&output=csv',
                    en: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOkdnVoo1JZxM3ZIw11KaQno61mag50VxycvqZ-kY6OC0oZ3tef1gJJYAnStaLlLsmaLvzIlR6KKRK/pub?gid=1709873212&single=true&output=csv',
                    tr: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOkdnVoo1JZxM3ZIw11KaQno61mag50VxycvqZ-kY6OC0oZ3tef1gJJYAnStaLlLsmaLvzIlR6KKRK/pub?gid=932024028&single=true&output=csv',
                    es: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOkdnVoo1JZxM3ZIw11KaQno61mag50VxycvqZ-kY6OC0oZ3tef1gJJYAnStaLlLsmaLvzIlR6KKRK/pub?gid=2126154876&single=true&output=csv',
                    ru: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOkdnVoo1JZxM3ZIw11KaQno61mag50VxycvqZ-kY6OC0oZ3tef1gJJYAnStaLlLsmaLvzIlR6KKRK/pub?gid=1383179966&single=true&output=csv',
                    ur: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOkdnVoo1JZxM3ZIw11KaQno61mag50VxycvqZ-kY6OC0oZ3tef1gJJYAnStaLlLsmaLvzIlR6KKRK/pub?gid=1356221249&single=true&output=csv',
                    hi: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOkdnVoo1JZxM3ZIw11KaQno61mag50VxycvqZ-kY6OC0oZ3tef1gJJYAnStaLlLsmaLvzIlR6KKRK/pub?gid=1947060246&single=true&output=csv',
                    fr: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOkdnVoo1JZxM3ZIw11KaQno61mag50VxycvqZ-kY6OC0oZ3tef1gJJYAnStaLlLsmaLvzIlR6KKRK/pub?gid=1967929524&single=true&output=csv',
                    du: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOkdnVoo1JZxM3ZIw11KaQno61mag50VxycvqZ-kY6OC0oZ3tef1gJJYAnStaLlLsmaLvzIlR6KKRK/pub?gid=330421505&single=true&output=csv',
                    zn: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOkdnVoo1JZxM3ZIw11KaQno61mag50VxycvqZ-kY6OC0oZ3tef1gJJYAnStaLlLsmaLvzIlR6KKRK/pub?gid=597359201&single=true&output=csv',
                    ja: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOkdnVoo1JZxM3ZIw11KaQno61mag50VxycvqZ-kY6OC0oZ3tef1gJJYAnStaLlLsmaLvzIlR6KKRK/pub?gid=1140262731&single=true&output=csv',
                    ko: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOkdnVoo1JZxM3ZIw11KaQno61mag50VxycvqZ-kY6OC0oZ3tef1gJJYAnStaLlLsmaLvzIlR6KKRK/pub?gid=961009172&single=true&output=csv',
                    it: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOkdnVoo1JZxM3ZIw11KaQno61mag50VxycvqZ-kY6OC0oZ3tef1gJJYAnStaLlLsmaLvzIlR6KKRK/pub?gid=1885756520&single=true&output=csv',
                    vi: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOkdnVoo1JZxM3ZIw11KaQno61mag50VxycvqZ-kY6OC0oZ3tef1gJJYAnStaLlLsmaLvzIlR6KKRK/pub?gid=37768217&single=true&output=csv',
                    th: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOkdnVoo1JZxM3ZIw11KaQno61mag50VxycvqZ-kY6OC0oZ3tef1gJJYAnStaLlLsmaLvzIlR6KKRK/pub?gid=369450170&single=true&output=csv',
                    id: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOkdnVoo1JZxM3ZIw11KaQno61mag50VxycvqZ-kY6OC0oZ3tef1gJJYAnStaLlLsmaLvzIlR6KKRK/pub?gid=1467238039&single=true&output=csv'
                },

                async loadData() {
                    try {
                        const res = await fetch(this.langLinks[this.currentLang]);
                        const text = await res.text();
                        const rows = text.split('\n').slice(1);
                        
                        let items = rows.map(row => {
                            // استخدام تعبير منتظم لتجاهل الفواصل داخل علامات الاقتباس
                            const cols = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || [];
                            return {
                                id: (cols[0] || '').replace(/"/g, ''),
                                category: (cols[1] || '').replace(/"/g, ''),
                                name: (cols[2] || '').replace(/"/g, ''),
                                price: (cols[3] || '').replace(/"/g, ''),
                                calories: (cols[4] || '').replace(/"/g, ''),
                                description: (cols[5] || '').replace(/"/g, ''),
                                image: (cols[6] || '').replace(/"/g, '') || 'https://via.placeholder.com/400x300/111/D4AF37?text=Taksim'
                            };
                        }).filter(i => i.id && i.name);

                        this.menuItems = items;
                        
                        // استخراج الفئات بالترتيب الموجود في الشيت
                        this.categoriesList = [...new Set(items.map(i => i.category).filter(Boolean))];

                        // توزيع العناصر على الأقسام في الصفحة الرئيسية (اعتماداً على أول 10 عناصر، والبحث بكلمات مفتاحية للأقسام الأخرى)
                        this.featuredItems = items.slice(0, 5);
                        
                        // جلب المشويات، البرجر، الخ للغداء (يبحث في اسم الفئة عن كلمات معينة لضمان عملها بكل اللغات)
                        this.lunchItems = items.filter(i => 
                            i.category.includes('مشويات') || i.category.includes('شاورما') || 
                            i.category.includes('برجر') || i.category.includes('Grill') || 
                            i.category.includes('Burger') || i.category.includes('Shawarma')
                        );
                        if(this.lunchItems.length === 0) this.lunchItems = items.slice(10, 20); // بديل في حال عدم تطابق الأسماء
                        
                        this.sweetItems = items.filter(i => 
                            i.category.includes('حلو') || i.category.includes('عصير') || 
                            i.category.includes('Dessert') || i.category.includes('Juice')
                        );
                        if(this.sweetItems.length === 0) this.sweetItems = items.slice(20, 30); // بديل
                        
                    } catch (e) {
                        console.error("Error fetching data:", e);
                    }
                },

                getItemsByCategory(cat) {
                    return this.menuItems.filter(i => i.category === cat);
                },

                goToSection(cat) {
                    this.view = 'all';
                    this.showFilter = false;
                    // تأخير بسيط للسماح للـ DOM بالرسم قبل التمرير
                    setTimeout(() => {
                        const el = document.getElementById('section-' + cat);
                        if (el) {
                            const offset = 70; // ارتفاع الناف بار
                            const bodyRect = document.body.getBoundingClientRect().top;
                            const elementRect = el.getBoundingClientRect().top;
                            const elementPosition = elementRect - bodyRect;
                            const offsetPosition = elementPosition - offset;
                            window.scrollTo({ top: offsetPosition, behavior: 'smooth' });
                        }
                    }, 100);
                },

                initApp() {
                    this.loadData();
                    // تحريك الهيرو كل 20 ثانية
                    this.heroInterval = setInterval(() => {
                        if (this.featuredItems.length > 0) {
                            this.heroIndex = (this.heroIndex + 1) % this.featuredItems.length;
                        }
                    }, 20000);
                }
            }
        }
    </script>
</body>
</html>
