<!DOCTYPE html>
<html lang="ar" dir="rtl" x-data="taksimApp()" :class="theme === 'light' ? 'light-theme' : ''">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Taksim Point | المنيو الرقمي</title>
    
    <link rel="icon" type="image/png" href="https://cdn.phototourl.com/free/2026-04-06-d0b6c388-fcdf-40fd-a7dc-56a84b8309a2.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* المتغيرات الديناميكية (الوضع الليلي الفاخر مع رخام واضح) */
        :root { 
            --gold: #D4AF37; 
            --bg-main: #0a0a0a; /* تفتيح درجة الأسود قليلاً لإبراز الرخام */
            --text-main: #ffffff;
            --text-muted: #9ca3af;
            --card-bg: rgba(18, 18, 18, 0.8);
            --section-bg: #0c0c0c;
            --border-color: rgba(212, 175, 55, 0.2);
            --glass-nav: rgba(10, 10, 10, 0.85);
            /* صورة رخام عالية الدقة وواضحة العروق */
            --marble-img: url('https://www.transparenttextures.com/patterns/black-mamba.png');
            --gold-glow: radial-gradient(circle at 50% 0%, rgba(212, 175, 55, 0.15) 0%, transparent 60%);
        }
        
        /* الوضع النهاري (أبيض رخامي) */
        .light-theme {
            --bg-main: #fcfcfc;
            --text-main: #111111;
            --text-muted: #4b5563;
            --card-bg: rgba(255, 255, 255, 0.9);
            --section-bg: #f4f4f4;
            --border-color: rgba(212, 175, 55, 0.4);
            --glass-nav: rgba(255, 255, 255, 0.95);
            --marble-img: url('https://www.transparenttextures.com/patterns/white-marble.png');
            --gold-glow: radial-gradient(circle at 50% 0%, rgba(212, 175, 55, 0.05) 0%, transparent 60%);
        }
        
        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: var(--bg-main); 
            /* دمج الرخام والإضاءة مع تقليل التعتيم لظهور النقوش */
            background-image: var(--gold-glow), var(--marble-img);
            background-attachment: fixed;
            background-size: cover, auto;
            color: var(--text-main); 
            -webkit-tap-highlight-color: transparent; 
            scroll-behavior: smooth;
            transition: background-color 0.5s, color 0.5s;
        }
        
        [x-cloak] { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .glass-nav { background: var(--glass-nav); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border-color); }
        .gold-gradient { background: linear-gradient(135deg, #BF953F, #FCF6BA, #B38728); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .slider-container { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scroll-behavior: smooth; }
        .slide { min-width: 100%; scroll-snap-align: center; }

        .tiktok-container { height: 100dvh; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .tiktok-item { height: 100dvh; scroll-snap-align: start; position: relative; }
        
        .category-bg-blend { position: absolute; inset: 0; z-index: 0; opacity: 0.3; mask-image: linear-gradient(to bottom, black 30%, transparent 100%); -webkit-mask-image: linear-gradient(to bottom, black 30%, transparent 100%); object-fit: cover; object-position: center; width: 100%; height: 100%; }
        
        .category-silhouette { filter: brightness(0.6) contrast(1.2) grayscale(0.2); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); object-fit: cover; object-position: center; }
        .cat-box:hover .category-silhouette { filter: brightness(1) contrast(1.2) grayscale(0); transform: scale(1.1); }

        .theme-card { background-color: var(--card-bg); backdrop-filter: blur(10px); border: 1px solid var(--border-color); box-shadow: 0 8px 32px rgba(0,0,0,0.1); transition: all 0.3s; }
        .watermark { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: 0.05; width: 80%; pointer-events: none; z-index: 0; }
    </style>
</head>
<body class="overflow-x-hidden relative" :dir="isRTL ? 'rtl' : 'ltr'" x-init="initApp()">

    <nav class="fixed top-0 w-full z-[100] glass-nav px-3 py-3 flex flex-wrap justify-between items-center gap-y-2" x-show="view !== 'explore'">
        <img src="https://cdn.phototourl.com/free/2026-04-06-d0b6c388-fcdf-40fd-a7dc-56a84b8309a2.png" alt="Taksim Point" class="h-8 object-contain">
        
        <div class="flex items-center gap-2">
            <button @click="toggleTheme()" class="p-1.5 border border-[var(--border-color)] rounded text-[#D4AF37] hover:bg-[#D4AF37] hover:text-black transition">
                <span x-show="theme === 'dark'">☀️</span><span x-show="theme === 'light'">🌙</span>
            </button>

            <button @click="showSearchModal = true" class="p-1 border border-[var(--border-color)] rounded text-[#D4AF37] hover:bg-[#D4AF37] hover:text-black transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </button>

            <button @click="showQRModal = true" class="p-1 border border-[var(--border-color)] rounded text-[#D4AF37] hover:bg-[#D4AF37] hover:text-black transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm14 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"></path></svg>
            </button>
            
            <select x-model="currentBranch" @change="updateBranchData()" class="bg-[var(--card-bg)] text-[#D4AF37] border border-[var(--border-color)] px-1 py-1 text-xs outline-none font-bold rounded">
                <option value="alshati" x-text="t('branch_alshati')"></option>
                <option value="almanar" x-text="t('branch_almanar')"></option>
                <option value="aljawhara" x-text="t('branch_aljawhara')"></option>
            </select>

            <select x-model="currentLang" @change="changeLanguage()" class="bg-[var(--card-bg)] text-[#D4AF37] border border-[var(--border-color)] px-1 py-1 text-xs outline-none font-bold rounded">
                <template x-for="(url, code) in langLinks" :key="code">
                    <option :value="code" x-text="langNames[code]"></option>
                </template>
            </select>
        </div>
    </nav>

    <div x-show="showSearchModal" x-transition.opacity x-cloak class="fixed inset-0 z-[250] bg-[var(--bg-main)] flex flex-col" :style="'background-image: var(--marble-img);'">
        <div class="flex items-center gap-3 p-4 glass-nav">
            <button @click="showSearchModal = false; searchQuery = ''" class="text-[#D4AF37] p-2 hover:bg-[#D4AF37]/10 rounded-full transition">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            <input type="text" x-model="searchQuery" :placeholder="t('search_placeholder')" class="flex-1 theme-card rounded-lg px-4 py-2.5 text-[var(--text-main)] text-sm outline-none focus:border-[#D4AF37] shadow-inner">
        </div>
        
        <div class="flex-1 overflow-y-auto p-5 pb-32">
            <div x-show="searchQuery.trim() === ''" x-transition>
                <h3 class="text-[#D4AF37] text-xs font-black mb-5 uppercase tracking-widest" x-text="t('browse_folders')"></h3>
                <div class="grid grid-cols-2 gap-3">
                    <template x-for="cat in normalCategories" :key="cat">
                        <button @click="showSearchModal = false; scrollToCat(cat)" class="theme-card rounded-xl p-4 flex flex-col items-center gap-3 hover:border-[#D4AF37] transition">
                            <span class="text-3xl drop-shadow">📁</span>
                            <span class="text-xs font-bold text-center" x-text="cat"></span>
                        </button>
                    </template>
                </div>
            </div>

            <div x-show="searchQuery.trim() !== ''" x-transition>
                <h3 class="text-[#D4AF37] text-xs font-black mb-5 uppercase tracking-widest" x-text="t('search_results')"></h3>
                <div class="flex flex-col gap-3">
                    <template x-for="item in searchResults" :key="item.id">
                        <div class="theme-card rounded-xl p-3 flex gap-3 items-center">
                            <img :src="item.image" class="w-16 h-16 rounded-lg object-cover">
                            <div class="flex-1">
                                <h4 class="text-sm font-bold line-clamp-1" x-text="item.name"></h4>
                                <p class="text-[10px] text-[#D4AF37] mb-1" x-text="item.category"></p>
                                <span class="font-bold text-xs" x-text="item.price + ' SR'"></span>
                            </div>
                            <button @click="toggleLike(item)" class="p-3 glass-nav rounded-full border border-[var(--border-color)] active:scale-90 transition">
                                <span x-text="isLiked(item.id) ? '❤️' : '🤍'"></span>
                            </button>
                        </div>
                    </template>
                    <div x-show="searchResults.length === 0" class="text-center text-[var(--text-muted)] text-sm mt-10 font-bold" x-text="t('no_results')"></div>
                </div>
            </div>
        </div>
    </div>

    <div x-show="showQRModal" x-cloak class="fixed inset-0 z-[200] bg-black/90 flex flex-col items-center justify-center p-6 backdrop-blur-md">
        <button @click="showQRModal = false" class="absolute top-6 right-6 text-white text-3xl font-black">✕</button>
        <div class="theme-card border-[#D4AF37]/50 p-8 rounded-2xl flex flex-col items-center shadow-[0_0_40px_rgba(212,175,55,0.3)]">
            <h2 class="text-[#D4AF37] font-black text-xl mb-1 text-center" x-text="t('branch_' + currentBranch)"></h2>
            <p class="text-[var(--text-muted)] text-xs mb-6 text-center">قم بمسح الباركود للوصول السريع لهذا الفرع</p>
            <div class="bg-white p-3 rounded-xl mb-6">
                <img :src="'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + encodeURIComponent(getBranchUrl())" class="w-48 h-48">
            </div>
            <button @click="copyBranchUrl()" class="w-full bg-gradient-to-r from-[#D4AF37] to-yellow-600 text-black font-black py-3 rounded-lg flex items-center justify-center gap-2 transition active:scale-95">
                <span>🔗</span> نسخ رابط الفرع
            </button>
        </div>
    </div>

    <div x-show="isLoading" class="fixed inset-0 z-[200] bg-[var(--bg-main)] flex flex-col items-center justify-center" :style="'background-image: var(--marble-img);'">
        <img src="https://cdn.phototourl.com/free/2026-04-06-d0b6c388-fcdf-40fd-a7dc-56a84b8309a2.png" class="h-20 mb-6 animate-pulse drop-shadow-[0_0_15px_rgba(212,175,55,0.5)]">
        <div class="text-[#D4AF37] text-sm font-bold tracking-widest uppercase">Taksim Point...</div>
    </div>

    <div x-show="view === 'home' && !isLoading && !hasError" x-transition.opacity.duration.500ms class="pb-32 pt-24">
        
        <section class="px-6 mb-12 text-center">
            <img src="https://cdn.phototourl.com/free/2026-04-06-d0b6c388-fcdf-40fd-a7dc-56a84b8309a2.png" class="h-20 mx-auto mb-6 object-contain drop-shadow-2xl">
            <h1 class="text-2xl font-black gold-gradient mb-4 text-center" x-text="t('about_title')"></h1>
            <p class="text-sm text-[var(--text-muted)] leading-relaxed text-justify px-2 mb-4 font-semibold" x-text="t('about_p1')"></p>
            <p class="text-sm text-[var(--text-muted)] leading-relaxed text-justify px-2 font-semibold" x-text="t('about_p2')"></p>
        </section>

        <section class="relative h-[35vh] w-full mb-12 px-4">
            <div class="slider-container h-full no-scrollbar rounded-xl shadow-[0_10px_30px_rgba(0,0,0,0.3)]" id="hero-slider">
                <template x-for="(item, index) in heroOffers" :key="item.id">
                    <div class="slide relative h-full theme-card rounded-xl overflow-hidden" :id="'hero-slide-' + index">
                        <img :src="item.image" loading="lazy" class="w-full h-full object-cover object-center opacity-90">
                        <div class="absolute inset-0 bg-gradient-to-t from-black via-black/50 to-transparent flex flex-col justify-end p-5">
                            <h2 class="text-2xl font-black text-white mb-1 drop-shadow-lg" x-text="item.name"></h2>
                            <p class="text-gray-300 text-xs line-clamp-2 mb-3" x-text="item.description"></p>
                            <div class="flex justify-between items-center">
                                <span class="text-xl font-bold text-[#D4AF37]" x-text="item.price + ' SR'"></span>
                                <button @click="scrollToCat(item.category)" class="bg-[#D4AF37] text-black px-4 py-1.5 text-xs font-bold rounded shadow-lg">الطلب ➔</button>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </section>

        <section class="px-5 mb-10">
            <h3 class="text-lg font-black mb-6 gold-gradient text-center uppercase tracking-widest" x-text="t('nav_menu')"></h3>
            <div class="grid grid-cols-2 gap-3">
                <template x-for="cat in normalCategories" :key="cat">
                    <button @click="scrollToCat(cat)" class="cat-box theme-card relative h-28 rounded-xl overflow-hidden flex items-center justify-center group border border-[var(--border-color)]">
                        <img :src="getCategoryBg(cat)" loading="lazy" class="absolute inset-0 w-full h-full category-silhouette">
                        <div class="absolute inset-0 bg-gradient-to-t from-black via-black/60 to-black/20"></div>
                        <span class="relative z-10 text-[#D4AF37] font-black text-sm text-center px-1 drop-shadow-[0_2px_4px_rgba(0,0,0,1)]" x-text="cat"></span>
                    </button>
                </template>
            </div>
        </section>
    </div>

    <div x-show="view === 'menu' && !hasError" x-cloak class="min-h-screen pt-20 pb-32">
        <div class="flex gap-2 overflow-x-auto no-scrollbar px-4 mb-4 pb-2 border-b border-[var(--border-color)] sticky top-[76px] z-40 glass-nav">
            <template x-for="cat in normalCategories" :key="cat">
                <button @click="scrollToCat(cat)" class="px-4 py-2 text-xs font-black whitespace-nowrap text-[var(--text-muted)] hover:text-[#D4AF37] transition" x-text="cat"></button>
            </template>
        </div>

        <div class="px-4">
            <template x-for="cat in normalCategories" :key="cat">
                <div class="mb-12 relative rounded-2xl overflow-hidden theme-card scroll-mt-[130px] shadow-lg" :id="'cat-' + btoa(unescape(encodeURIComponent(cat))).replace(/=/g, '')">
                    <img :src="getCategoryBg(cat)" loading="lazy" class="category-bg-blend">
                    
                    <div class="relative z-10 p-5">
                        <h2 class="text-2xl font-black mb-6 drop-shadow-lg flex items-center gap-3">
                            <span class="w-1.5 h-6 bg-[#D4AF37]"></span>
                            <span x-text="cat" class="text-[var(--text-main)]"></span>
                        </h2>
                        
                        <div class="flex flex-col gap-4">
                            <template x-for="item in activeMenuItems.filter(i => i.category === cat)" :key="item.id">
                                <div class="flex justify-between items-start border-b border-[var(--border-color)] pb-4 last:border-0">
                                    <div class="flex-1 pr-4">
                                        <h4 class="font-bold text-[var(--text-main)] text-sm mb-1 drop-shadow" x-text="item.name"></h4>
                                        <p class="text-[11px] text-[var(--text-muted)] leading-relaxed mb-2 w-full font-medium" x-text="item.description"></p>
                                        <span class="text-[#D4AF37] font-black text-sm" x-text="item.price + ' SR'"></span>
                                    </div>
                                    <button @click="toggleLike(item)" class="p-3 glass-nav rounded-full border border-[var(--border-color)] active:scale-90 transition flex-shrink-0">
                                        <span x-text="isLiked(item.id) ? '❤️' : '🤍'"></span>
                                    </button>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <div x-show="view === 'explore' && !hasError" x-cloak class="tiktok-container relative bg-black">
        <template x-for="item in activeExploreItems" :key="item.id">
            <div class="tiktok-item" :id="'explore-' + item.id">
                <template x-if="item.isSocial">
                    <div class="absolute inset-0 flex flex-col items-center justify-center p-8 bg-gradient-to-b from-[#0a0a0a] to-[#1a1a1a] z-50">
                        <img :src="item.image" class="h-28 mb-8 drop-shadow-[0_0_20px_rgba(212,175,55,0.4)]">
                        <h2 class="text-3xl font-black text-[#D4AF37] mb-4 text-center" x-text="item.name"></h2>
                        <p class="text-gray-300 text-center mb-10 text-sm leading-relaxed" x-text="item.description"></p>
                        <div class="grid grid-cols-2 gap-4 w-full max-w-xs">
                            <a href="https://www.tiktok.com/@taksim_point" target="_blank" class="bg-[#111] border border-white/10 rounded-xl p-4 flex flex-col items-center gap-2 hover:border-[#D4AF37] transition"><span class="text-2xl">🎵</span><span class="text-xs font-bold text-white">TikTok</span></a>
                            <a href="https://www.instagram.com/taksim_point" target="_blank" class="bg-[#111] border border-white/10 rounded-xl p-4 flex flex-col items-center gap-2 hover:border-[#D4AF37] transition"><span class="text-2xl">📸</span><span class="text-xs font-bold text-white">Instagram</span></a>
                            <a href="https://www.youtube.com/channel/UCa6QUKNGNa4FKSOxhSeyxiQ" target="_blank" class="bg-[#111] border border-white/10 rounded-xl p-4 flex flex-col items-center gap-2 hover:border-[#D4AF37] transition"><span class="text-2xl">▶️</span><span class="text-xs font-bold text-white">YouTube</span></a>
                            <a href="https://taksimpoint.sa/locations/" target="_blank" class="bg-[#111] border border-white/10 rounded-xl p-4 flex flex-col items-center gap-2 hover:border-[#D4AF37] transition"><span class="text-2xl">📍</span><span class="text-xs font-bold text-white">Locations</span></a>
                        </div>
                    </div>
                </template>
                <template x-if="!item.isSocial">
                    <div class="w-full h-full relative">
                        <template x-if="item.isVideo || isVideo(item.image)">
                            <video :src="item.image" autoplay loop muted playsinline preload="metadata" class="w-full h-full object-cover object-center"></video>
                        </template>
                        <template x-if="!item.isVideo && !isVideo(item.image)">
                            <img :src="item.image" loading="lazy" class="w-full h-full object-cover object-center opacity-90">
                        </template>
                        <div class="absolute inset-0 bg-gradient-to-t from-black via-black/40 to-transparent flex flex-col justify-end p-6 pb-32">
                            <span class="bg-red-600/80 backdrop-blur text-white text-[10px] font-bold px-2 py-1 rounded w-max mb-2 uppercase" x-text="t('nav_explore')"></span>
                            <h2 class="text-3xl font-black mb-2 text-white drop-shadow-xl" x-text="item.name"></h2>
                            <p class="text-gray-200 text-sm mb-4 max-w-[80%] drop-shadow-md line-clamp-3" x-text="item.description"></p>
                            <template x-if="item.price"><span class="text-2xl font-black text-[#D4AF37] drop-shadow-lg" x-text="item.price + ' SR'"></span></template>
                            <div class="absolute right-4 bottom-32 flex flex-col gap-6 items-center">
                                <template x-if="!item.custom">
                                    <button @click="toggleLike(item)" class="bg-black/50 backdrop-blur p-4 rounded-full border border-white/20 active:scale-75 transition">
                                        <span class="text-3xl" x-text="isLiked(item.id) ? '❤️' : '🤍'"></span>
                                    </button>
                                </template>
                                <button @click="shareExplore(item.id)" class="bg-black/50 backdrop-blur p-4 rounded-full border border-white/20 active:scale-75 transition">
                                    <span class="text-2xl">🔗</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </template>
    </div>

    <div x-show="view === 'likes'" x-transition x-cloak class="min-h-screen pt-20 pb-32 px-4">
        <h2 class="text-2xl font-black text-center mb-8 gold-gradient uppercase" x-text="t('nav_likes')"></h2>
        <div x-show="likes.length === 0" class="text-center mt-20 text-[var(--text-muted)] font-bold" x-text="t('empty_likes')"></div>

        <div class="flex flex-col gap-4 mb-10">
            <template x-for="item in likedItemsList" :key="item.id">
                <div class="theme-card p-3 flex flex-col gap-3 rounded-xl border border-[var(--border-color)] shadow-sm">
                    <div class="flex justify-between items-center">
                        <div class="flex-1 px-2">
                            <h4 class="font-bold text-sm" x-text="item.name"></h4>
                            <span class="text-[#D4AF37] text-xs font-bold" x-text="item.price + ' SR'"></span>
                        </div>
                        <button @click="toggleLike(item)" class="text-red-500 bg-red-500/10 px-3 py-2 rounded text-xs font-bold border border-red-500/20 active:scale-95 transition">حذف</button>
                    </div>
                    <div class="flex justify-between items-center px-2 pt-2 border-t border-[var(--border-color)]">
                        <span class="text-xs text-[var(--text-muted)] font-bold">الكمية:</span>
                        <div class="flex items-center gap-4 bg-[var(--section-bg)] border border-[var(--border-color)] rounded-lg px-3 py-1">
                            <button @click="updateQty(item.id, -1)" class="text-lg font-bold text-[#D4AF37] hover:scale-110 transition">-</button>
                            <span class="font-bold text-sm w-4 text-center text-[var(--text-main)]" x-text="quantities[item.id] || 1"></span>
                            <button @click="updateQty(item.id, 1)" class="text-lg font-bold text-[#D4AF37] hover:scale-110 transition">+</button>
                        </div>
                    </div>
                </div>
            </template>
        </div>

                get isRTL() { return ['ar', 'ur', 'fa', 'he'].includes(this.currentLang); },
                t(key) { const dict = this.uiDict[this.currentLang] || this.uiDict['en']; return dict[key] || this.uiDict['ar'][key] || key; },

                toggleTheme() {
                    this.theme = this.theme === 'dark' ? 'light' : 'dark';
                    localStorage.setItem('taksim_theme', this.theme);
                },

                initLocalStorage() {
                    try {
                        const savedLikes = localStorage.getItem('taksim_likes');
                        if(savedLikes) this.likes = JSON.parse(savedLikes);
                        
                        const savedQty = localStorage.getItem('taksim_qty');
                        if(savedQty) this.quantities = JSON.parse(savedQty);
                    } catch (e) { 
                        this.likes = []; this.quantities = {};
                        localStorage.removeItem('taksim_likes'); localStorage.removeItem('taksim_qty');
                    }
                },

                async changeLanguage(isBackgroundSync = false) {
                    if(!isBackgroundSync) { this.isLoading = true; this.hasError = false; }
                    try {
                        const res = await fetch(this.langLinks[this.currentLang] + '&t=' + Date.now());
                        if (!res.ok) throw new Error('Network Issue');
                        const text = await res.text();
                        
                        Papa.parse(text, {
                            header: false, skipEmptyLines: true,
                            complete: (results) => {
                                const rows = results.data.slice(1);
                                let parsedData = rows.map(cols => {
                                    let id = (cols[0] || '').trim();
                                    return {
                                        id: id, category: (cols[1] || '').trim(), name: (cols[2] || '').trim(),
                                        price: (cols[3] || '').trim(), calories: (cols[4] || '').trim(),
                                        description: (cols[5] || '').replace(/\r?\n|\r/g, ' ').trim(),
                                        image: (cols[6] || '').trim(), almanar: (cols[7] || '').trim(),
                                        aljawhara: (cols[8] || '').trim(), alshati: (cols[9] || '').trim()
                                    }
                                }).filter(i => i.id && i.id.startsWith('TP-'));

                                if (parsedData.length === 0) throw new Error('No Data');

                                this.allRawData = parsedData;

                                this.categoryBgs = {};
                                parsedData.forEach(item => {
                                    if(this.hardcodedCategoryImages[item.id]) {
                                        this.categoryBgs[item.category] = this.hardcodedCategoryImages[item.id];
                                    }
                                });

                                this.updateBranchData();
                            },
                            error: () => { if(!isBackgroundSync) this.hasError = true; }
                        });
                    } catch (e) { if(!isBackgroundSync) this.hasError = true; this.isLoading = false; }
                },

                updateBranchData() {
                    let availableItems = this.allRawData.filter(item => {
                        if (this.currentBranch === 'almanar' && item.almanar === 'غير متوفر') return false;
                        if (this.currentBranch === 'aljawhara' && item.aljawhara === 'غير متوفر') return false;
                        if (this.currentBranch === 'alshati' && item.alshati === 'غير متوفر') return false;
                        return true;
                    });

                    this.activeMenuItems = availableItems.filter(item => {
                        const numId = parseInt(item.id.replace('TP-', ''));
                        return (numId < 280 || numId > 302) && !['الاستكشاف', 'Explore', 'Keşfet'].includes(item.category);
                    });

                    this.heroOffers = this.activeMenuItems.filter(i => this.targetHeroIds.includes(i.id));

                    let dbExploreItems = availableItems.filter(i => ['الاستكشاف', 'Explore', 'Keşfet'].includes(i.category));
                    const customVideo = { id: 'custom-vid-1', name: 'أجواء تقسيم بوينت', description: 'شاهد الفخامة والمذاق الأصيل في أروقة مطاعمنا.', price: '', image: 'https://drive.google.com/uc?export=download&id=1AbI4yPT8MqLWciJrts2SY66UYkwmmRQm', category: 'استكشاف', isVideo: true, custom: true };
                    const socialCard = { id: 'social-card-1', name: 'تابعونا على المنصات', description: 'كن على إطلاع دائم بآخر العروض والأطباق الجديدة من تقسيم بوينت.', image: 'https://cdn.phototourl.com/free/2026-04-06-d0b6c388-fcdf-40fd-a7dc-56a84b8309a2.png', isSocial: true, custom: true };

                    this.activeExploreItems = [customVideo, ...dbExploreItems, socialCard];

                    // التحديث الصامت للرابط بناء على الفرع لحماية المشاركة
                    const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?branch=' + this.currentBranch;
                    window.history.replaceState({path:newUrl}, '', newUrl);

                    this.startAutoScroll();
                    this.isLoading = false;
                },

                get searchResults() {
                    if (this.searchQuery.trim() === '') return [];
                    const q = this.searchQuery.toLowerCase();
                    return this.activeMenuItems.filter(i => 
                        i.name.toLowerCase().includes(q) || 
                        i.category.toLowerCase().includes(q) || 
                        i.description.toLowerCase().includes(q)
                    );
                },

                // التمرير الأفقي المحمي (بدون قفز للصفحة)
                startAutoScroll() {
                    if(this.heroInterval) clearInterval(this.heroInterval);
                    this.heroInterval = setInterval(() => {
                        const slider = document.getElementById('hero-slider');
                        if (slider) {
                            const slideWidth = slider.clientWidth;
                            if (slider.scrollLeft + slideWidth >= slider.scrollWidth - 10) {
                                slider.scrollTo({ left: 0, behavior: 'smooth' }); // الرجوع للأول
                            } else {
                                slider.scrollBy({ left: this.isRTL ? -slideWidth : slideWidth, behavior: 'smooth' });
                            }
                        }
                    }, 5000);
                },

                startBackgroundSync() {
                    if(this.syncInterval) clearInterval(this.syncInterval);
                    this.syncInterval = setInterval(() => { this.changeLanguage(true); }, 60000);
                },

                get normalCategories() { return [...new Set(this.activeMenuItems.map(i => i.category))].filter(c => c !== ''); },
                getCategoryBg(catName) { return this.categoryBgs[catName] || 'https://images.unsplash.com/photo-1555939594-58d7cb561ad1?w=800'; },
                
                // جلب الرابط النظيف (يحذف أي بارامترات استضافة إضافية)
                getBranchUrl() { 
                    return window.location.origin + window.location.pathname + '?branch=' + this.currentBranch; 
                },
                copyBranchUrl() { navigator.clipboard.writeText(this.getBranchUrl()).then(() => alert('تم نسخ رابط الفرع!')); },

                isVideo(url) { return url && (url.match(/\.(mp4|webm|ogg)$/i) || url.includes('video') || url.includes('drive.google')); },

                scrollToCat(cat) {
                    this.view = 'menu';
                    this.showSearchModal = false; // إغلاق نافذة البحث إن كانت مفتوحة
                    const safeCatId = btoa(unescape(encodeURIComponent(cat))).replace(/=/g, '');
                    setTimeout(() => {
                        const el = document.getElementById('cat-' + safeCatId);
                        if(el) {
                            // التمرير لمكان دقيق يعلو القسم بـ 120px ليظهر تحت الناف بار
                            const y = el.getBoundingClientRect().top + window.pageYOffset - 120;
                            window.scrollTo({top: y, behavior: 'smooth'});
                        }
                    }, 350); 
                },

                get likedItemsList() { return this.likes.map(id => this.allRawData.find(i => i.id === id)).filter(Boolean); },

                toggleLike(item) {
                    const audio = document.getElementById('sfx-pop');
                    if(audio) { audio.volume = 0.3; audio.currentTime = 0; audio.play().catch(e=>{}); }
                    
                    if(this.likes.includes(item.id)) {
                        this.likes = this.likes.filter(id => id !== item.id);
                        delete this.quantities[item.id]; 
                    } else {
                        this.likes.push(item.id);
                        this.quantities[item.id] = 1; 
                    }
                    this.saveLikesAndQty();
                },

                updateQty(id, delta) {
                    if(!this.quantities[id]) this.quantities[id] = 1;
                    this.quantities[id] += delta;
                    if(this.quantities[id] < 1) this.quantities[id] = 1;
                    this.saveLikesAndQty();
                },

                saveLikesAndQty() {
                    localStorage.setItem('taksim_likes', JSON.stringify(this.likes));
                    localStorage.setItem('taksim_qty', JSON.stringify(this.quantities));
                },

                isLiked(id) { return this.likes.includes(id); },

                shareExplore(id) {
                    const url = window.location.origin + window.location.pathname + '?branch=' + this.currentBranch + '&explore=' + id;
                    if (navigator.share) navigator.share({ title: 'استكشف هذا من تقسيم بوينت', url: url });
                    else { navigator.clipboard.writeText(url); alert('تم نسخ الرابط!'); }
                },

                initApp() { 
                    this.initLocalStorage(); 
                    
                    const urlParams = new URLSearchParams(window.location.search);
                    const allowedBranches = ['alshati', 'almanar', 'aljawhara'];
                    let b = urlParams.get('branch');
                    if(b && allowedBranches.includes(b)) this.currentBranch = b; 
                    
                    // كشف الاستكشاف بعد تهيئة البيانات
                    const exploreId = urlParams.get('explore');
                    if(exploreId) {
                        this.view = 'explore';
                        setTimeout(() => {
                            const el = document.getElementById('explore-' + exploreId);
                            if(el) el.scrollIntoView({ behavior: 'auto' });
                        }, 1000);
                    }

                    this.changeLanguage(); 
                    this.startBackgroundSync();
                }
            }
        }
    </script>
</body>
</html>
