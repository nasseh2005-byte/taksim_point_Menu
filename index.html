        },

        async loadMenu() {
            try {
                const res = await fetch(this.langLinks[this.currentLang]);
                const text = await res.text();
                const rows = text.split('\n').slice(1);
                
                this.menuItems = rows.map(row => {
                    const cols = row.split(',');
                    return {
                        id: cols[0]?.trim(),
                        category: cols[1]?.trim(),
                        name: cols[2]?.trim(),
                        price: cols[3]?.trim(),
                        calories: cols[4]?.trim(),
                        description: cols[5]?.trim(),
                        image: cols[6]?.trim() || 'https://via.placeholder.com/400x300/111/D4AF37?text=Taksim+Point'
                    }
                }).filter(i => i.id);

                // تحديث الفئات والمحتوى بناءً على اللغة الجديدة
                this.featuredItems = this.menuItems.slice(0, 5); 
                this.lunchItems = this.menuItems.filter(i => ['المشويات', 'Grills', 'Izgaralar'].includes(i.category));
                this.sweetItems = this.menuItems.filter(i => ['الحلويات', 'Desserts', 'Tatlılar'].includes(i.category));
                this.categoriesList = [...new Set(this.menuItems.map(i => i.category))];
                
            } catch (e) { console.error('Error switching language:', e); }
        },
        // ... باقي الوظائف (initApp, openCategory, etc)
