<!DOCTYPE html>
<html lang="ar" dir="rtl" x-data="taksimApp()" class="dark-theme">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Taksim Point | الواجهة البحرية</title>
    
    <link rel="icon" type="image/png" href="https://cdn.phototourl.com/free/2026-04-06-d0b6c388-fcdf-40fd-a7dc-56a84b8309a2.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Montserrat:wght@400;600;700;900&family=Cinzel+Decorative:wght@700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --gold: #D4AF37; 
            --white-gold: #e8d9b6; 
            --bg-main: #080808; 
            --text-main: #ffffff;
            --text-muted: #9ca3af;
            --card-bg: rgba(18, 18, 18, 0.88); /* شفافية خفيفة لضمان قراءة النص */
            --section-bg: #0c0c0c;
            --border-color: rgba(232, 217, 182, 0.25); 
            --glass-nav: rgba(10, 10, 10, 0.96);
            --marble-img: url('https://www.transparenttextures.com/patterns/black-mamba.png');
            --gold-glow: radial-gradient(circle at 50% 0%, rgba(212, 175, 55, 0.15) 0%, transparent 60%);
        }
        
        body { 
            font-family: 'Montserrat', 'Cairo', sans-serif; 
            background-color: var(--bg-main); 
            background-image: var(--gold-glow), var(--marble-img);
            background-attachment: fixed;
            background-size: cover, auto;
            color: var(--text-main); 
            -webkit-tap-highlight-color: transparent; 
            scroll-behavior: smooth;
        }
        
        [x-cloak] { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .text-brand-gold { color: var(--white-gold) !important; }
        .pdf-title-ar { font-family: 'Cairo', sans-serif; font-weight: 900; }
        
        .glass-nav { background: var(--glass-nav); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border-color); box-shadow: 0 4px 25px rgba(0,0,0,0.5); }
        .slider-container { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scroll-behavior: smooth; }
        .slide { min-width: 100%; scroll-snap-align: center; }
        .theme-card { background-color: var(--card-bg); backdrop-filter: blur(10px); border: 1px solid var(--border-color); box-shadow: 0 8px 32px rgba(0,0,0,0.1); transition: all 0.3s; }
        
        /* تعديل الخلفية لتكون متكررة وواضحة جداً بالمركز بدون تعتيم */
        .category-bg-repeat {
            background-repeat: repeat;
            background-size: contain; 
            background-position: center top;
            opacity: 0.5; /* تم رفع الإضاءة بشكل كبير لتوضيح الصورة */
            position: absolute;
            inset: 0;
            z-index: 0;
        }
    </style>
</head>
<body class="overflow-x-hidden relative" :dir="isRTL ? 'rtl' : 'ltr'" x-init="initApp()" @scroll.window="handleScroll()">

    <nav class="fixed top-0 w-full z-[100] glass-nav px-3 py-3 flex justify-between items-center" x-show="view !== 'explore'">
        <div class="flex items-center gap-2">
            <img src="https://cdn.phototourl.com/free/2026-04-06-d0b6c388-fcdf-40fd-a7dc-56a84b8309a2.png" alt="Taksim Point" class="h-8 object-contain">
            <span class="text-[10px] font-black text-brand-gold bg-white/5 px-2 py-1 rounded border border-[var(--border-color)]">الواجهة البحرية</span>
        </div>
        
        <div class="flex items-center gap-2">
            <button @click="showSearchModal = true" class="p-1 border border-[var(--border-color)] rounded text-brand-gold hover:bg-[var(--white-gold)] hover:text-black transition shadow-sm">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </button>

            <button @click="showQRModal = true" class="p-1 border border-[var(--border-color)] rounded text-brand-gold hover:bg-[var(--white-gold)] hover:text-black transition shadow-sm">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm14 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"></path></svg>
            </button>
            
            <div class="flex items-center bg-[var(--card-bg)] border border-[var(--border-color)] rounded px-1 py-0.5 shadow-sm">
                <span class="text-xs mr-1">🌍</span>
                <select x-model="currentLang" @change="changeLanguage()" class="bg-transparent text-brand-gold text-[10px] outline-none font-bold cursor-pointer">
                    <template x-for="(url, code) in langLinks" :key="code">
                        <option :value="code" x-text="langNames[code]"></option>
                    </template>
                </select>
            </div>
        </div>
    </nav>

    <div x-show="showSearchModal" x-transition.opacity x-cloak class="fixed inset-0 z-[250] bg-[var(--bg-main)] flex flex-col" style="background-image: var(--marble-img);">
        <div class="flex items-center gap-3 p-4 glass-nav">
            <button @click="showSearchModal = false; searchQuery = ''" class="text-brand-gold p-2 rounded-full transition">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            <input type="text" x-model="searchQuery" :placeholder="t('search_placeholder')" class="flex-1 theme-card rounded-lg px-4 py-2.5 text-[var(--text-main)] text-sm outline-none focus:border-[var(--white-gold)] font-bold">
        </div>
        <div class="flex-1 overflow-y-auto p-5 pb-32">
            <div x-show="searchQuery.trim() === ''" x-transition>
                <div class="grid grid-cols-3 gap-3">
                    <template x-for="cat in normalCategories" :key="cat">
                        <button @click="showSearchModal = false; scrollToCat(cat)" class="theme-card rounded-xl p-4 flex flex-col items-center gap-2 hover:border-[var(--white-gold)] transition">
                            <span class="text-3xl" x-text="getCatEmoji(cat)"></span>
                            <span class="text-[10px] font-bold text-center leading-tight text-brand-gold" x-text="cat"></span>
                        </button>
                    </template>
                </div>
            </div>
            <div x-show="searchQuery.trim() !== ''" x-transition>
                <div class="flex flex-col gap-3">
                    <template x-for="item in searchResults" :key="item.id">
                        <div class="theme-card rounded-xl p-3 flex gap-3 items-center">
                            <img :src="item.image" class="w-16 h-16 rounded-lg object-cover">
                            <div class="flex-1">
                                <h4 class="text-sm font-bold line-clamp-1 text-brand-gold" x-text="item.name"></h4>
                                <span class="font-black text-xs text-brand-gold" x-text="item.price + ' SR'"></span>
                            </div>
                            <button @click="toggleLike(item)" class="p-3 glass-nav rounded-full border border-[var(--border-color)]">
                                <span x-text="isLiked(item.id) ? '❤️' : '🤍'"></span>
                            </button>
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </div>

    <div x-show="showQRModal" x-cloak class="fixed inset-0 z-[200] bg-black/90 flex flex-col items-center justify-center p-6 backdrop-blur-md">
        <button @click="showQRModal = false" class="absolute top-6 right-6 text-white text-3xl font-black">✕</button>
        <div class="theme-card border-[var(--border-color)] p-8 rounded-2xl flex flex-col items-center shadow-[0_0_40px_rgba(232,217,182,0.1)]">
            <h2 class="font-black text-xl mb-1 text-center text-brand-gold">تقسيم بوينت | الواجهة البحرية</h2>
            <div class="bg-white p-3 rounded-xl mb-6">
                <img :src="'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + encodeURIComponent(window.location.href)" class="w-48 h-48">
            </div>
            <button @click="copyBranchUrl()" class="w-full bg-gradient-to-r from-[var(--white-gold)] to-[#B38728] text-black font-black py-3 rounded-lg flex items-center justify-center gap-2 transition active:scale-95">🔗 نسخ رابط المنيو</button>
        </div>
    </div>

    <div x-show="isLoading" class="fixed inset-0 z-[200] bg-[var(--bg-main)] flex flex-col items-center justify-center" style="background-image: var(--marble-img);">
        <img src="https://cdn.phototourl.com/free/2026-04-06-d0b6c388-fcdf-40fd-a7dc-56a84b8309a2.png" class="h-20 mb-6 animate-pulse">
        <div class="text-brand-gold text-sm font-black tracking-widest uppercase">Taksim Point Alshati...</div>
    </div>

    <button @click="scrollToCat('مشويات')" class="fixed top-[115px] left-4 z-[90] bg-gradient-to-r from-[#D4AF37] to-[#B38728] text-black text-[11px] font-black px-4 py-2 rounded-full shadow-[0_4px_15px_rgba(212,175,55,0.4)] border border-[#e8d9b6]/50 transition-transform active:scale-95 flex items-center gap-1" x-show="view === 'menu'" x-transition x-cloak>
        <span class="text-sm">🔥</span> الأكثر طلباً
    </button>

    <div x-show="view === 'home' && !isLoading" class="pb-32 pt-24">
        <section class="px-6 mb-8 text-center">
            <img src="https://cdn.phototourl.com/free/2026-04-06-d0b6c388-fcdf-40fd-a7dc-56a84b8309a2.png" class="h-20 mx-auto mb-6 object-contain">
            <h1 class="text-2xl font-black mb-4 text-center text-brand-gold">تقسيم بوينت | الواجهة البحرية</h1>
            <p class="text-sm text-brand-gold opacity-90 leading-relaxed text-justify px-2 font-semibold">استمتع بألذ المأكولات التركية العالمية على إطلالة الواجهة البحرية الساحرة بجدة.</p>
        </section>

        <div class="px-4 mb-10">
            <button @click="scrollToCat('مشويات')" class="w-full bg-gradient-to-r from-[#D4AF37] to-[#B38728] text-black rounded-xl p-4 flex items-center justify-between shadow-[0_5px_20px_rgba(212,175,55,0.3)] active:scale-95 transition">
                <div class="flex items-center gap-3">
                    <span class="text-3xl">🔥</span>
                    <div class="text-right">
                        <h3 class="font-black text-lg">الأكثر طلباً</h3>
                        <p class="text-[10px] font-bold opacity-80">اكتشف ألذ المشويات لدينا</p>
                    </div>
                </div>
                <span class="text-2xl font-black">➔</span>
            </button>
        </div>

        <section class="relative h-[30vh] w-full mb-12 px-4">
            <div class="slider-container h-full no-scrollbar rounded-xl shadow-2xl" id="hero-slider">
                <template x-for="(item, index) in heroOffers" :key="item.id">
                    <div class="slide relative h-full theme-card rounded-xl overflow-hidden" :id="'hero-slide-' + index">
                        <img :src="item.image" loading="lazy" class="w-full h-full object-cover opacity-90">
                        <div class="absolute inset-0 bg-gradient-to-t from-black via-black/40 to-transparent flex flex-col justify-end p-5">
                            <h2 class="text-xl font-black mb-1 text-brand-gold" x-text="item.name"></h2>
                            <div class="flex justify-between items-center">
                                <span class="text-lg font-black text-brand-gold" x-text="item.price + ' SR'"></span>
                                <button @click="scrollToCat(item.category)" class="bg-[var(--white-gold)] text-black px-4 py-1.5 text-[10px] font-black rounded shadow-lg">اطلب الآن</button>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </section>

        <section class="px-6 mb-10">
            <h3 class="text-lg font-black mb-4 text-center text-brand-gold">موقعنا على الخريطة</h3>
            <div class="overflow-hidden rounded-2xl shadow-xl border border-[var(--border-color)]">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d237390.7503461374!2d39.41345214843751!3d21.615940981653758!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x15c3db004673f109%3A0xa40a38ea0b786d88!2z2YXYt9i52YUg2KrZgtiz2YrZhSDYqNmI2YrZhtiqIHwgVGFrc2ltcG9pbnQgcmVzdGF1cmFudHM!5e0!3m2!1sar!2ssa!4v1776364267628!5m2!1sar!2ssa" width="100%" height="250" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
            </div>
        </section>

        <section class="px-5 mb-10">
            <h3 class="text-lg font-black mb-6 text-center uppercase text-brand-gold" x-text="t('nav_menu')"></h3>
            <div class="grid grid-cols-2 gap-3">
                <template x-for="cat in normalCategories" :key="cat">
                    <button @click="scrollToCat(cat)" class="cat-box theme-card relative h-28 rounded-xl overflow-hidden flex items-center justify-center border border-[var(--border-color)]">
                        <img :src="getCategoryBg(cat)" class="absolute inset-0 w-full h-full opacity-60 object-cover">
                        <div class="absolute inset-0 bg-black/40"></div>
                        <span class="relative z-10 font-black text-sm text-center px-1 text-brand-gold" x-text="cat"></span>
                    </button>
                </template>
            </div>
        </section>
    </div>

    <div x-show="view === 'menu'" class="min-h-screen pt-20 pb-32" x-cloak>
        <div class="fixed top-[65px] left-0 w-full z-40 transition-transform duration-300" :class="showCatBar ? 'translate-y-0' : '-translate-y-full'">
            <div class="flex gap-2 overflow-x-auto no-scrollbar px-4 py-2 glass-nav border-b border-[var(--border-color)]">
                <template x-for="cat in normalCategories" :key="cat">
                    <button @click="scrollToCat(cat)" class="px-4 py-2 text-xs font-black whitespace-nowrap text-brand-gold opacity-70 hover:opacity-100 transition" x-text="cat"></button>
                </template>
            </div>
        </div>

        <div class="px-4 mt-12">
            <template x-for="cat in normalCategories" :key="cat">
                <div class="mb-16 relative rounded-xl overflow-hidden shadow-2xl border scroll-mt-[130px] min-h-[85vh] bg-[var(--bg-main)]" 
                     :id="'cat-' + btoa(unescape(encodeURIComponent(cat))).replace(/=/g, '')">
                    
                    <div class="category-bg-repeat" :style="'background-image: url(' + getCategoryBg(cat) + ');'"></div>

                    <div class="relative z-20 p-5 md:p-10 w-full flex flex-col" dir="rtl">
                        
                        <div class="mb-8 border-r-4 pr-4 border-[var(--white-gold)]">
                            <h2 class="text-3xl md:text-5xl pdf-title-ar mb-1 text-brand-gold" x-text="cat"></h2>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 pb-10">
                            <template x-for="item in getCatItems(cat)" :key="item.id">
                                <div class="flex flex-col relative theme-card rounded-lg p-3 border backdrop-blur-sm transition-all duration-300"
                                     :class="(item.name.includes('جريل') || item.name.toLowerCase().includes('grill')) ? 'border-[#D4AF37] shadow-[0_0_15px_rgba(212,175,55,0.2)]' : 'border-[var(--border-color)]/50'">
                                    
                                    <template x-if="item.name.includes('جريل') || item.name.toLowerCase().includes('grill')">
                                        <span class="absolute -top-3 left-3 bg-gradient-to-r from-[#D4AF37] to-[#B38728] text-black text-[9px] font-black px-2 py-0.5 rounded shadow-lg">🔥 الأكثر طلباً</span>
                                    </template>

                                    <div class="flex items-end w-full mb-1.5 gap-1">
                                        <h4 class="font-bold text-sm md:text-base leading-tight max-w-[70%]" 
                                            :class="(item.name.includes('جريل') || item.name.toLowerCase().includes('grill')) ? 'text-[#D4AF37]' : 'text-brand-gold'" 
                                            x-text="item.name"></h4>
                                        <div class="flex-1 border-b-2 border-dotted relative top-[-4px] min-w-[10px]" 
                                             :class="(item.name.includes('جريل') || item.name.toLowerCase().includes('grill')) ? 'border-[#D4AF37]/50' : 'border-[var(--white-gold)]/40'"></div>
                                        <span class="font-black text-sm md:text-base whitespace-nowrap" 
                                              :class="(item.name.includes('جريل') || item.name.toLowerCase().includes('grill')) ? 'text-[#D4AF37]' : 'text-brand-gold'" x-text="item.price + ' SR'"></span>
                                    </div>
                                    <div class="flex justify-between items-start gap-2">
                                        <p class="text-[11px] md:text-xs opacity-80 font-bold line-clamp-2 flex-1 pr-1 text-brand-gold" x-text="item.description"></p>
                                        <button @click="toggleLike(item)" class="p-1.5 glass-nav rounded-full border border-[var(--border-color)] active:scale-90 transition">
                                            <span x-text="isLiked(item.id) ? '❤️' : '🤍'" class="text-[10px]"></span>
                                        </button>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <div x-show="view === 'likes'" x-transition x-cloak class="min-h-screen pt-20 pb-32 px-4">
        <h2 class="text-2xl font-black text-center mb-8 uppercase text-brand-gold" x-text="t('nav_likes')"></h2>
        <div x-show="likes.length === 0" class="text-center mt-20 text-[var(--white-gold)] opacity-70 font-black" x-text="t('empty_likes')"></div>

        <div class="flex flex-col gap-4 mb-10">
            <template x-for="item in likedItemsList" :key="item.id">
                <div class="theme-card p-3 flex flex-col gap-3 rounded-xl border border-[var(--border-color)]">
                    <div class="flex justify-between items-center">
                        <div class="flex-1 px-2">
                            <h4 class="font-black text-sm text-brand-gold" x-text="item.name"></h4>
                            <span class="text-[var(--white-gold)] text-xs font-black" x-text="item.price + ' SR'"></span>
                        </div>
                        <button @click="toggleLike(item)" class="text-red-500 bg-red-500/10 px-3 py-2 rounded text-xs font-bold border border-red-500/20 active:scale-95 transition">حذف</button>
                    </div>
                    <div class="flex justify-between items-center px-2 pt-2 border-t border-[var(--border-color)]">
                        <span class="text-xs text-[var(--text-muted)] font-black">الكمية:</span>
                        <div class="flex items-center gap-4 bg-[var(--section-bg)] border border-[var(--border-color)] rounded-lg px-3 py-1">
                            <button @click="updateQty(item.id, -1)" class="text-lg font-black text-[var(--white-gold)]">-</button>
                            <span class="font-black text-sm w-4 text-center text-[var(--text-main)]" x-text="quantities[item.id] || 1"></span>
                            <button @click="updateQty(item.id, 1)" class="text-lg font-black text-[var(--white-gold)]">+</button>
                        </div>
                    </div>
                </div>
            </template>
        </div>

        <button x-show="likes.length > 0" @click="showInvoiceModal = true" class="w-full bg-gradient-to-r from-[var(--white-gold)] to-[#B38728] text-black font-black py-4 rounded-xl text-lg shadow-xl">إظهار كفاتورة</button>
    </div>

    <div x-show="showInvoiceModal" x-transition x-cloak class="fixed inset-0 z-[300] bg-black/80 flex flex-col items-center justify-center p-4 backdrop-blur-md">
        <div class="theme-card w-full max-w-md rounded-2xl overflow-hidden shadow-2xl relative border border-[var(--border-color)] flex flex-col max-h-[85vh]">
            <img src="https://cdn.phototourl.com/free/2026-04-06-d0b6c388-fcdf-40fd-a7dc-56a84b8309a2.png" class="watermark">
            <div class="p-5 border-b border-[var(--border-color)] flex justify-between items-center relative z-10 glass-nav">
                <h2 class="font-black text-xl text-brand-gold">فاتورة الطلب</h2>
                <button @click="showInvoiceModal = false" class="text-[var(--white-gold)] opacity-70 text-2xl">✕</button>
            </div>
            <div class="p-5 overflow-y-auto relative z-10 flex-1">
                <template x-for="item in likedItemsList" :key="item.id">
                    <div class="flex justify-between items-center border-b border-[var(--border-color)] border-dashed py-3 last:border-0">
                        <div class="flex-1 pr-2">
                            <h4 class="font-black text-sm text-[var(--text-main)]" x-text="item.name"></h4>
                            <span class="text-[10px] text-brand-gold opacity-80 mt-1 font-bold" x-text="'الكمية: ' + (quantities[item.id] || 1)"></span>
                        </div>
                        <div class="font-black text-[var(--white-gold)] text-sm" x-text="((parseFloat(item.price)||0) * (quantities[item.id] || 1)) + ' SR'"></div>
                    </div>
                </template>
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 w-full glass-nav px-4 py-3 z-[150]">
        <div class="flex justify-between items-center max-w-md mx-auto">
            <button @click="view = 'home'" :class="view === 'home' ? 'text-brand-gold' : 'text-brand-gold opacity-50'" class="flex flex-col items-center gap-1 w-1/3 transition">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 3l9 7.5v10.5h-6v-6h-6v6h-6v-10.5z"/></svg>
                <span class="text-[10px] font-black">الرئيسية</span>
            </button>
            <button @click="view = 'menu'" :class="view === 'menu' ? 'text-brand-gold' : 'text-brand-gold opacity-50'" class="flex flex-col items-center gap-1 w-1/3 transition">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"></path></svg>
                <span class="text-[10px] font-black">المنيو</span>
            </button>
            <button @click="view = 'likes'" :class="view === 'likes' ? 'text-brand-gold' : 'text-brand-gold opacity-50'" class="flex flex-col items-center gap-1 relative w-1/3 transition">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                <span x-show="likes.length > 0" class="absolute -top-1 right-1/2 translate-x-4 bg-red-600 text-white text-[9px] font-bold w-4 h-4 rounded-full flex items-center justify-center" x-text="likes.length"></span>
                <span class="text-[10px] font-black" x-text="t('nav_likes')"></span>
            </button>
        </div>
    </div>

    <script>
        function taksimApp() {
            return {
                isLoading: true, view: 'home', currentLang: 'ar', 
                showSearchModal: false, showQRModal: false, showInvoiceModal: false, searchQuery: '',        
                showCatBar: true, lastScroll: 0,
                allRawData: [], activeMenuItems: [], heroOffers: [], categoryBgs: {}, likes: [], quantities: {},
                targetHeroIds: ['TP-116', 'TP-185', 'TP-186', 'TP-003', 'TP-004'],

                langNames: { 
                    ar: 'ar العربية', en: 'en English', tr: 'tr Türkçe', es: 'es Español', ru: 'ru Русский', 
                    ur: 'ur اردو', hi: 'hi हिन्दी', fr: 'fr Français', de: 'de Deutsch', zh: 'zh 中文', 
                    ja: 'ja 日本語', ko: 'ko 한국어', it: 'it Italiano', vi: 'vi Tiếng Việt', th: 'th ไทย', id: 'id Indonesia' 
                },
                langLinks: {
                    ar: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOkdnVoo1JZxM3ZIw11KaQno61mag50VxycvqZ-kY6OC0oZ3tef1gJJYAnStaLlLsmaLvzIlR6KKRK/pub?gid=2026156602&single=true&output=csv',
                    en: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOkdnVoo1JZxM3ZIw11KaQno61mag50VxycvqZ-kY6OC0oZ3tef1gJJYAnStaLlLsmaLvzIlR6KKRK/pub?gid=1709873212&single=true&output=csv',
                    tr: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOkdnVoo1JZxM3ZIw11KaQno61mag50VxycvqZ-kY6OC0oZ3tef1gJJYAnStaLlLsmaLvzIlR6KKRK/pub?gid=932024028&single=true&output=csv',
                    es: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOkdnVoo1JZxM3ZIw11KaQno61mag50VxycvqZ-kY6OC0oZ3tef1gJJYAnStaLlLsmaLvzIlR6KKRK/pub?gid=2126154876&single=true&output=csv',
                    ru: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOkdnVoo1JZxM3ZIw11KaQno61mag50VxycvqZ-kY6OC0oZ3tef1gJJYAnStaLlLsmaLvzIlR6KKRK/pub?gid=1383179966&single=true&output=csv',
                    ur: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOkdnVoo1JZxM3ZIw11KaQno61mag50VxycvqZ-kY6OC0oZ3tef1gJJYAnStaLlLsmaLvzIlR6KKRK/pub?gid=1356221249&single=true&output=csv',
                    hi: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOkdnVoo1JZxM3ZIw11KaQno61mag50VxycvqZ-kY6OC0oZ3tef1gJJYAnStaLlLsmaLvzIlR6KKRK/pub?gid=1947060246&single=true&output=csv',
                    fr: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOkdnVoo1JZxM3ZIw11KaQno61mag50VxycvqZ-kY6OC0oZ3tef1gJJYAnStaLlLsmaLvzIlR6KKRK/pub?gid=1967929524&single=true&output=csv',
                    de: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOkdnVoo1JZxM3ZIw11KaQno61mag50VxycvqZ-kY6OC0oZ3tef1gJJYAnStaLlLsmaLvzIlR6KKRK/pub?gid=330421505&single=true&output=csv',
                    zh: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOkdnVoo1JZxM3ZIw11KaQno61mag50VxycvqZ-kY6OC0oZ3tef1gJJYAnStaLlLsmaLvzIlR6KKRK/pub?gid=597359201&single=true&output=csv',
                    ja: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOkdnVoo1JZxM3ZIw11KaQno61mag50VxycvqZ-kY6OC0oZ3tef1gJJYAnStaLlLsmaLvzIlR6KKRK/pub?gid=1140262731&single=true&output=csv',
                    ko: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOkdnVoo1JZxM3ZIw11KaQno61mag50VxycvqZ-kY6OC0oZ3tef1gJJYAnStaLlLsmaLvzIlR6KKRK/pub?gid=961009172&single=true&output=csv',
                    it: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOkdnVoo1JZxM3ZIw11KaQno61mag50VxycvqZ-kY6OC0oZ3tef1gJJYAnStaLlLsmaLvzIlR6KKRK/pub?gid=1885756520&single=true&output=csv',
                    vi: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOkdnVoo1JZxM3ZIw11KaQno61mag50VxycvqZ-kY6OC0oZ3tef1gJJYAnStaLlLsmaLvzIlR6KKRK/pub?gid=37768217&single=true&output=csv',
                    th: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOkdnVoo1JZxM3ZIw11KaQno61mag50VxycvqZ-kY6OC0oZ3tef1gJJYAnStaLlLsmaLvzIlR6KKRK/pub?gid=369450170&single=true&output=csv',
                    id: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOkdnVoo1JZxM3ZIw11KaQno61mag50VxycvqZ-kY6OC0oZ3tef1gJJYAnStaLlLsmaLvzIlR6KKRK/pub?gid=1467238039&single=true&output=csv'
                },

                get isRTL() { return ['ar', 'ur'].includes(this.currentLang); },
                t(key) { 
                    const dicts = {
                        ar: { nav_menu: "قائمة الطعام", nav_likes: "طلباتي", search_placeholder: "ابحث عن طبق...", empty_likes: "سلتك فارغة" },
                        en: { nav_menu: "Food Menu", nav_likes: "My Order", search_placeholder: "Search...", empty_likes: "Empty Basket" }
                    };
                    return dicts[this.currentLang]?.[key] || dicts['ar'][key];
                },

                handleScroll() {
                    const y = window.pageYOffset;
                    this.showCatBar = y <= this.lastScroll || y < 100;
                    this.lastScroll = y;
                },

                async changeLanguage() {
                    this.isLoading = true;
                    try {
                        const res = await fetch(this.langLinks[this.currentLang] + '&t=' + Date.now());
                        const text = await res.text();
                        Papa.parse(text, {
                            header: false, skipEmptyLines: true,
                            complete: (results) => {
                                const rows = results.data.slice(1);
                                this.categoryBgs = {};
                                this.allRawData = rows.map(cols => {
                                    let id = (cols[0] || '').trim();
                                    let cat = (cols[1] || '').trim();
                                    let numId = parseInt(id.replace('TP-', ''));
                                    if(numId >= 250 && numId <= 400 && cat) this.categoryBgs[cat] = (cols[6] || '').trim();
                                    return {
                                        id: id, category: cat, name: (cols[2] || '').trim(),
                                        price: (cols[3] || '').trim(), description: (cols[5] || '').trim(),
                                        image: (cols[6] || '').trim(),
                                        available: cols.length > 9 ? (cols[9] || '').trim() : '' // توفر الواجهة البحرية
                                    }
                                }).filter(i => i.id.startsWith('TP-'));
                                this.updateBranchData();
                            }
                        });
                    } catch (e) { this.isLoading = false; }
                },

                updateBranchData() {
                    this.activeMenuItems = this.allRawData.filter(i => i.available !== 'غير متوفر' && (parseInt(i.id.replace('TP-','')) < 250 || parseInt(i.id.replace('TP-','')) > 400));
                    this.heroOffers = this.activeMenuItems.filter(i => this.targetHeroIds.includes(i.id));
                    this.isLoading = false;
                },

                get searchResults() {
                    const q = this.searchQuery.toLowerCase();
                    return q ? this.activeMenuItems.filter(i => i.name.toLowerCase().includes(q)) : [];
                },

                get normalCategories() { return [...new Set(this.activeMenuItems.map(i => i.category))].filter(c => c); },
                getCatItems(cat) { return this.activeMenuItems.filter(i => i.category === cat); },
                getCategoryBg(cat) { return this.categoryBgs[cat] || ''; },
                getCatEmoji(cat) { return '🍽️'; },

                scrollToCat(cat) {
                    this.view = 'menu';
                    const id = 'cat-' + btoa(unescape(encodeURIComponent(cat))).replace(/=/g, '');
                    setTimeout(() => {
                        const el = document.getElementById(id);
                        if(el) window.scrollTo({top: el.offsetTop - 120, behavior: 'smooth'});
                    }, 100);
                },

                toggleLike(item) {
                    if(this.likes.includes(item.id)) {
                        this.likes = this.likes.filter(id => id !== item.id);
                        delete this.quantities[item.id];
                    } else { 
                        this.likes.push(item.id); 
                        this.quantities[item.id] = 1; 
                    }
                    localStorage.setItem('alshati_likes_v3', JSON.stringify(this.likes));
                    localStorage.setItem('alshati_qty_v3', JSON.stringify(this.quantities));
                },
                isLiked(id) { return this.likes.includes(id); },
                updateQty(id, d) { 
                    this.quantities[id] = Math.max(1, (this.quantities[id] || 1) + d); 
                    localStorage.setItem('alshati_qty_v3', JSON.stringify(this.quantities));
                },
                get likedItemsList() { return this.likes.map(id => this.allRawData.find(i => i.id === id)).filter(Boolean); },
                copyBranchUrl() { navigator.clipboard.writeText(window.location.origin).then(() => alert('تم النسخ!')); },

                initApp() { 
                    const saved = localStorage.getItem('alshati_likes_v3');
                    if(saved) this.likes = JSON.parse(saved);
                    const savedQ = localStorage.getItem('alshati_qty_v3');
                    if(savedQ) this.quantities = JSON.parse(savedQ);
                    this.changeLanguage(); 
                }
            }
        }
    </script>
</body>
