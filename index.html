<!DOCTYPE html>
<html lang="ar" dir="rtl" x-data="taksimApp()">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Taksim Point | المنيو الرقمي الفاخر</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #D4AF37; --bg: #030303; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg); color: white; -webkit-tap-highlight-color: transparent; scroll-behavior: smooth; }
        [x-cloak] { display: none !important; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .glass-nav { background: rgba(5, 5, 5, 0.9); backdrop-filter: blur(25px); border-bottom: 1px solid rgba(212, 175, 55, 0.2); }
        .sharp-card { border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 4px; background: #0a0a0a; transition: all 0.3s ease; }
        .sharp-card:hover { border-color: var(--gold); box-shadow: 0 0 20px rgba(212, 175, 55, 0.1); }
        
        .gold-gradient { background: linear-gradient(135deg, #BF953F, #FCF6BA, #B38728); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero-title { text-shadow: 0 4px 10px rgba(0,0,0,0.9); }
        
        .slider-container { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scroll-behavior: smooth; }
        .slide { min-width: 100%; scroll-snap-align: center; }

        /* TikTok / Explore View */
        .tiktok-container { height: 100dvh; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .tiktok-item { height: 100dvh; scroll-snap-align: start; position: relative; }
    </style>
</head>
<body class="overflow-x-hidden relative" :dir="isRTL ? 'rtl' : 'ltr'" x-init="initApp()">

    <nav class="fixed top-0 w-full z-[100] glass-nav px-4 py-3 flex justify-between items-center" x-show="view !== 'explore'">
        <img src="https://cdn.phototourl.com/free/2026-04-06-d0b6c388-fcdf-40fd-a7dc-56a84b8309a2.png" alt="Taksim Point" class="h-10 object-contain">
        
        <select x-model="currentLang" @change="changeLanguage()" class="bg-black text-[#D4AF37] border border-[#D4AF37]/50 px-2 py-1 text-xs outline-none font-bold">
            <template x-for="(url, code) in langLinks" :key="code">
                <option :value="code" x-text="langNames[code]"></option>
            </template>
        </select>
    </nav>

    <div x-show="isLoading" class="fixed inset-0 z-[200] bg-black flex flex-col items-center justify-center">
        <img src="https://cdn.phototourl.com/free/2026-04-06-d0b6c388-fcdf-40fd-a7dc-56a84b8309a2.png" class="h-16 mb-4 animate-pulse">
        <div class="text-[#D4AF37] text-sm font-bold tracking-widest">TAKSIM POINT PREPARING...</div>
    </div>

    <div x-show="view === 'home' && !isLoading" x-transition.opacity.duration.500ms class="pb-32 pt-16">
        
        <section class="relative h-[50vh] w-full mb-10 overflow-hidden">
            <div class="slider-container h-full no-scrollbar" id="hero-slider">
                <template x-for="item in sliders.hero" :key="item.id">
                    <div class="slide relative h-full">
                        <img :src="item.image" class="w-full h-full object-cover opacity-60">
                        <div class="absolute inset-0 bg-gradient-to-t from-[#030303] via-transparent to-transparent flex flex-col justify-end p-6">
                            <span class="text-[#D4AF37] text-[10px] font-black tracking-widest mb-2 uppercase" x-text="t('hero_heading')"></span>
                            <h2 class="text-3xl font-black text-white mb-2 hero-title" x-text="item.name"></h2>
                            <p class="text-gray-400 text-xs mb-5 line-clamp-2 max-w-[80%]" x-text="item.description"></p>
                            <div class="flex justify-between items-center">
                                <span class="text-2xl font-bold gold-gradient" x-text="item.price + ' SR'"></span>
                                <button @click="openCategory(item.category, 'pop')" class="border border-[#D4AF37] text-[#D4AF37] px-6 py-2 text-xs font-bold uppercase tracking-wider hover:bg-[#D4AF37] hover:text-black transition" x-text="t('explore_btn')"></button>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </section>

        <section class="px-5 mb-12">
            <h3 class="text-lg font-black mb-5 flex items-center gap-3">
                <span class="w-1 h-5 bg-[#D4AF37]"></span>
                <span x-text="t('breakfast_title')"></span>
            </h3>
            
            <div class="slider-container overflow-hidden h-44 mb-6" id="breakfast-slider">
                <template x-for="item in sliders.breakfast" :key="item.id">
                    <div class="slide relative px-1">
                        <div class="relative h-full w-full overflow-hidden">
                            <img :src="item.image" class="w-full h-full object-cover opacity-70 rounded-sm">
                            <div class="absolute inset-0 bg-black/40 p-4 flex flex-col justify-end">
                                <h4 class="font-bold text-white text-sm" x-text="item.name"></h4>
                                <span class="text-[#D4AF37] text-xs font-bold" x-text="item.price + ' SR'"></span>
                            </div>
                        </div>
                    </div>
                </template>
            </div>

            <div class="grid grid-cols-4 gap-2">
                <template x-for="cat in breakfastCats" :key="cat.id">
                    <button @click="openCategory(cat.id, 'pop')" class="bg-[#0a0a0a] border border-white/5 p-3 flex flex-col items-center gap-2 active:border-[#D4AF37] transition">
                        <span class="text-lg" x-text="cat.icon"></span>
                        <span class="text-[9px] font-bold uppercase text-gray-400" x-text="t(cat.key)"></span>
                    </button>
                </template>
            </div>
        </section>

        <section class="px-5 mb-12">
            <h3 class="text-lg font-black mb-5 flex items-center gap-3">
                <span class="w-1 h-5 bg-red-700"></span>
                <span x-text="t('lunch_title')"></span>
            </h3>
            
            <div class="slider-container overflow-hidden h-52 mb-6" id="lunch-slider">
                <template x-for="item in sliders.lunch" :key="item.id">
                    <div class="slide relative px-1">
                        <div class="relative h-full w-full overflow-hidden">
                            <img :src="item.image" class="w-full h-full object-cover opacity-80">
                            <div class="absolute inset-0 bg-gradient-to-t from-black p-5 flex flex-col justify-end">
                                <h4 class="text-lg font-black text-white" x-text="item.name"></h4>
                                <div class="flex justify-between items-center mt-2">
                                    <span class="text-[#D4AF37] font-bold" x-text="item.price + ' SR'"></span>
                                    <button @click="openCategory(item.category, 'sizzle')" class="text-[10px] font-bold text-[#D4AF37] border-b border-[#D4AF37]" x-text="t('explore_btn')"></button>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>
            </div>

            <div class="grid grid-cols-3 gap-2">
                <template x-for="cat in lunchCats" :key="cat.id">
                    <button @click="openCategory(cat.id, 'sizzle')" class="bg-[#0a0a0a] border border-white/5 py-3 flex items-center justify-center active:border-red-600 transition">
                        <span class="text-[10px] font-bold uppercase text-gray-400" x-text="t(cat.key)"></span>
                    </button>
                </template>
            </div>
        </section>

        <section class="px-5 mb-12">
            <h3 class="text-lg font-black mb-5 flex items-center gap-3">
                <span class="w-1 h-5 bg-blue-500"></span>
                <span x-text="t('sweets_title')"></span>
            </h3>
            
            <div class="slider-container overflow-hidden h-44 mb-6" id="sweets-slider">
                <template x-for="item in sliders.sweets" :key="item.id">
                    <div class="slide relative px-1">
                        <div class="relative h-full w-full overflow-hidden">
                            <img :src="item.image" class="w-full h-full object-cover opacity-70">
                            <div class="absolute inset-0 flex flex-col justify-center items-center text-center p-4">
                                <h4 class="font-bold text-white text-sm mb-1" x-text="item.name"></h4>
                                <span class="text-[#D4AF37] text-xs font-bold" x-text="item.price + ' SR'"></span>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
            
            <div class="grid grid-cols-2 gap-2">
                <template x-for="cat in sweetsCats" :key="cat.id">
                    <button @click="openCategory(cat.id, 'pour')" class="bg-[#0a0a0a] border border-white/5 p-4 flex justify-between items-center active:border-blue-500 transition">
                        <span class="text-[10px] font-bold uppercase" x-text="t(cat.key)"></span>
                        <span x-text="cat.icon"></span>
                    </button>
                </template>
            </div>
        </section>

        <footer class="mt-16 px-5 py-10 border-t border-white/5 text-center">
            <div class="flex justify-center gap-8 mb-8">
                <a href="https://www.tiktok.com/@taksim_point" target="_blank" class="text-gray-500 hover:text-white"><svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64 2.93 2.93 0 0 1 .88.13V9.4a6.84 6.84 0 0 0-1-.05A6.33 6.33 0 0 0 5 20.1a6.34 6.34 0 0 0 10.86-4.43v-7a8.16 8.16 0 0 0 4.77 1.52v-3.4a4.85 4.85 0 0 1-1.04-.1z"/></svg></a>
                <a href="https://www.instagram.com/taksim_point" target="_blank" class="text-gray-500 hover:text-white"><svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg></a>
                <a href="https://taksimpoint.sa/locations/" target="_blank" class="text-[#D4AF37] text-[10px] font-bold tracking-widest uppercase border border-[#D4AF37]/30 px-4 py-2">Our Locations 📍</a>
            </div>
        </footer>
    </div>

    <div x-show="view === 'menu'" x-cloak class="min-h-screen pt-20 pb-32 px-4">
        <div class="flex gap-2 overflow-x-auto no-scrollbar mb-8 pb-2">
            <button @click="menuFilter = 'الكل'" :class="menuFilter === 'الكل' ? 'text-[#D4AF37] border-b-2 border-[#D4AF37]' : 'text-gray-500'" class="px-4 py-2 text-xs font-black whitespace-nowrap uppercase tracking-tighter" x-text="t('all_items')"></button>
            <template x-for="cat in categoriesList" :key="cat">
                <button @click="menuFilter = cat" :class="menuFilter === cat ? 'text-[#D4AF37] border-b-2 border-[#D4AF37]' : 'text-gray-500'" class="px-4 py-2 text-xs font-black whitespace-nowrap uppercase tracking-tighter" x-text="cat"></button>
            </template>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <template x-for="item in currentMenuItems" :key="item.id">
                <div class="sharp-card flex h-36 overflow-hidden">
                    <img :src="item.image" class="w-1/3 object-cover border-l border-white/5">
                    <div class="p-4 w-2/3 flex flex-col justify-between">
                        <div>
                            <h4 class="font-bold text-sm mb-1" x-text="item.name"></h4>
                            <p class="text-[10px] text-gray-500 line-clamp-2 leading-relaxed" x-text="item.description"></p>
                        </div>
                        <div class="flex justify-between items-end">
                            <span class="text-[#D4AF37] font-bold text-sm" x-text="item.price + ' SR'"></span>
                            <button @click="toggleLike(item)" class="p-2 border border-white/5 active:scale-90 transition">
                                <span x-text="isLiked(item.id) ? '❤️' : '🤍'"></span>
                            </button>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <div x-show="view === 'explore'" x-cloak class="tiktok-container relative bg-black">
        <template x-for="item in menuItems" :key="item.id">
            <div class="tiktok-item" :id="'item-' + item.id">
                <img :src="item.image" loading="lazy" class="w-full h-full object-cover opacity-70">
                <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent flex flex-col justify-end p-6 pb-32">
                    <span class="text-[#D4AF37] text-xs font-bold mb-1 tracking-widest uppercase" x-text="item.category"></span>
                    <h2 class="text-4xl font-black mb-2 tracking-tighter" x-text="item.name"></h2>
                    <p class="text-gray-300 text-sm mb-6 max-w-[85%] leading-relaxed" x-text="item.description"></p>
                    <div class="flex justify-between items-center">
                        <span class="text-3xl font-black text-[#D4AF37]" x-text="item.price + ' SR'"></span>
                        <div class="flex flex-col gap-6 items-center">
                            <button @click="toggleLike(item)" class="bg-black/50 backdrop-blur-xl p-4 border border-white/20 active:scale-75 transition">
                                <span class="text-3xl" x-text="isLiked(item.id) ? '❤️' : '🤍'"></span>
                            </button>
                            <button @click="shareItem(item)" class="bg-black/50 backdrop-blur-xl p-4 border border-white/20 active:scale-75 transition">
                                <span class="text-2xl">🔗</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </template>
    </div>

    <div x-show="view === 'likes'" x-transition x-cloak class="min-h-screen pt-20 pb-32 px-4">
        <h2 class="text-2xl font-black text-center mb-8 gold-gradient uppercase" x-text="t('nav_likes')"></h2>
        
        <div x-show="likes.length === 0" class="text-center mt-20 text-gray-600 font-bold" x-text="t('empty_likes')"></div>

        <div class="flex flex-col gap-3 mb-10">
            <template x-for="item in likedItemsList" :key="item.id">
                <div class="sharp-card p-4 flex justify-between items-center">
                    <img :src="item.image" class="w-14 h-14 object-cover">
                    <div class="flex-1 px-4">
                        <h4 class="font-bold text-sm" x-text="item.name"></h4>
                        <span class="text-[#D4AF37] text-xs font-bold" x-text="item.price + ' SR'"></span>
                    </div>
                    <button @click="toggleLike(item)" class="text-red-500 bg-red-500/5 px-3 py-2 text-xs border border-red-500/10">REMOVE</button>
                </div>
            </template>
        </div>

        <button x-show="likes.length > 0" @click="copyOrder()" class="w-full bg-[#D4AF37] text-black font-black py-5 text-lg shadow-xl active:scale-95 transition tracking-widest" x-text="t('copy_order')"></button>
    </div>

    <div class="fixed bottom-0 w-full glass-nav px-6 py-4 z-[150] border-t border-[#D4AF37]/10">
        <div class="flex justify-between items-center max-w-lg mx-auto">
            <button @click="view = 'home'" :class="view === 'home' ? 'text-[#D4AF37]' : 'text-gray-500'" class="flex flex-col items-center gap-1 w-1/4">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 3l9 7.5v10.5h-6v-6h-6v6h-6v-10.5z"/></svg>
                <span class="text-[9px] font-black uppercase tracking-tighter" x-text="t('nav_home')"></span>
            </button>
            <button @click="view = 'menu'" :class="view === 'menu' ? 'text-[#D4AF37]' : 'text-gray-500'" class="flex flex-col items-center gap-1 w-1/4">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"></path></svg>
                <span class="text-[9px] font-black uppercase tracking-tighter" x-text="t('nav_menu')"></span>
            </button>
            <button @click="view = 'explore'" :class="view === 'explore' ? 'text-[#D4AF37]' : 'text-gray-400'" class="flex flex-col items-center gap-1 w-1/4">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <span class="text-[9px] font-black uppercase tracking-tighter" x-text="t('nav_explore')"></span>
            </button>
            <button @click="view = 'likes'" :class="view === 'likes' ? 'text-[#D4AF37]' : 'text-gray-500'" class="flex flex-col items-center gap-1 relative w-1/4">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                <span x-show="likes.length > 0" class="absolute -top-1 right-3 bg-red-600 text-white text-[8px] font-bold w-3.5 h-3.5 rounded-full flex items-center justify-center" x-text="likes.length"></span>
                <span class="text-[9px] font-black uppercase tracking-tighter" x-text="t('nav_likes')"></span>
            </button>
        </div>
    </div>

    <audio id="sfx-pop" src="https://actions.google.com/sounds/v1/ui/click.ogg" preload="auto"></audio>
    <audio id="sfx-sizzle" src="https://actions.google.com/sounds/v1/food/sizzling_meat.ogg" preload="auto"></audio>
    <audio id="sfx-pour" src="https://actions.google.com/sounds/v1/water/water_pouring.ogg" preload="auto"></audio>

    <script>
        function taksimApp() {
            return {
                isLoading: true,
                view: 'home', 
                currentLang: 'ar',
                menuItems: [],
                menuFilter: 'الكل',
                likes: JSON.parse(localStorage.getItem('taksim_likes') || '[]'),
                
                uiDict: {
                    ar: {
                        hero_heading: "سيمفونية الأطباق العالمية والمميزة ✨",
                        breakfast_title: "إشراقة المذاق | فطور تقسيم بوينت",
                        lunch_title: "أصالة اللحوم | غداء تقسيم بوينت",
                        sweets_title: "فن الحلويات وانتعاش المذاق",
                        view_section: "استكشف", all_items: "الكل",
                        nav_home: "الرئيسية", nav_menu: "الأصناف", nav_explore: "استكشاف", nav_likes: "طلباتي",
                        copy_order: "📋 نسخ الطلب للموظف", loading: "جاري التحميل...", empty_likes: "سلتك فارغة حالياً",
                        cat_breakfast: "الفطور", cat_eggs: "البيض", cat_foul: "فول وفلافل", cat_appetizers: "مقبلات",
                        cat_grills: "المشويات", cat_shawarma: "الشاورما", cat_burger: "البرجر", cat_steak: "الستيك", cat_casserole: "طواجن", cat_pizza: "البيتزا",
                        cat_sweets: "الحلويات", cat_juice: "العصائر", cat_coffee: "القهوة"
                    },
                    en: {
                        hero_heading: "Global & Signature Masterpieces ✨",
                        breakfast_title: "Morning Glow | Taksim Breakfast",
                        lunch_title: "Meat Authenticity | Taksim Lunch",
                        sweets_title: "Dessert Art & Refreshment",
                        view_section: "Explore", all_items: "All",
                        nav_home: "Home", nav_menu: "Menu", nav_explore: "Explore", nav_likes: "My Order",
                        copy_order: "📋 Copy Order", loading: "Loading...", empty_likes: "Your cart is empty",
                        cat_breakfast: "Breakfast", cat_eggs: "Eggs", cat_foul: "Foul & Falafel", cat_appetizers: "Appetizers",
                        cat_grills: "Grills", cat_shawarma: "Shawarma", cat_burger: "Burger", cat_steak: "Steak", cat_casserole: "Casseroles", cat_pizza: "Pizza",
                        cat_sweets: "Sweets", cat_juice: "Juices", cat_coffee: "Coffee"
                    }
                },

                breakfastCats: [
                    {id: 'الفطور', key: 'cat_breakfast', icon: '🥐'}, {id: 'البيض', key: 'cat_eggs', icon: '🍳'}, 
                    {id: 'الفول والفلافل', key: 'cat_foul', icon: '🧆'}, {id: 'مقبلات', key: 'cat_appetizers', icon: '🥗'}
                ],
                lunchCats: [
                    {id: 'المشويات', key: 'cat_grills', icon: '🥩'}, {id: 'الشاورما', key: 'cat_shawarma', icon: '🌯'}, 
                    {id: 'البرجر', key: 'cat_burger', icon: '🍔'}, {id: 'الستيك', key: 'cat_steak', icon: '🥩'},
                    {id: 'طواجن', key: 'cat_casserole', icon: '🥘'}, {id: 'البيتزا', key: 'cat_pizza', icon: '🍕'}
                ],
                sweetsCats: [
                    {id: 'الحلويات', key: 'cat_sweets', icon: '🍰'}, {id: 'العصائر', key: 'cat_juice', icon: '🍹'}, 
                    {id: 'القهوة', key: 'cat_coffee', icon: '☕'}
                ],

                langNames: { ar: 'العربية', en: 'English', tr: 'Türkçe', es: 'Español', ru: 'Русский', ur: 'اردو', hi: 'हिन्दी', fr: 'Français', du: 'Deutsch', zn: '中文', ja: '日本語', ko: '한국어', it: 'Italiano', vi: 'Tiếng Việt', th: 'ไทย', id: 'Indonesia' },

                langLinks: {
                    ar: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOkdnVoo1JZxM3ZIw11KaQno61mag50VxycvqZ-kY6OC0oZ3tef1gJJYAnStaLlLsmaLvzIlR6KKRK/pub?gid=2026156602&single=true&output=csv',
                    en: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOkdnVoo1JZxM3ZIw11KaQno61mag50VxycvqZ-kY6OC0oZ3tef1gJJYAnStaLlLsmaLvzIlR6KKRK/pub?gid=1709873212&single=true&output=csv',
                    tr: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOkdnVoo1JZxM3ZIw11KaQno61mag50VxycvqZ-kY6OC0oZ3tef1gJJYAnStaLlLsmaLvzIlR6KKRK/pub?gid=932024028&single=true&output=csv',
                    es: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOkdnVoo1JZxM3ZIw11KaQno61mag50VxycvqZ-kY6OC0oZ3tef1gJJYAnStaLlLsmaLvzIlR6KKRK/pub?gid=2126154876&single=true&output=csv',
                    ru: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOkdnVoo1JZxM3ZIw11KaQno61mag50VxycvqZ-kY6OC0oZ3tef1gJJYAnStaLlLsmaLvzIlR6KKRK/pub?gid=1383179966&single=true&output=csv',
                    ur: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOkdnVoo1JZxM3ZIw11KaQno61mag50VxycvqZ-kY6OC0oZ3tef1gJJYAnStaLlLsmaLvzIlR6KKRK/pub?gid=1356221249&single=true&output=csv',
                    hi: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOkdnVoo1JZxM3ZIw11KaQno61mag50VxycvqZ-kY6OC0oZ3tef1gJJYAnStaLlLsmaLvzIlR6KKRK/pub?gid=1947060246&single=true&output=csv',
                    fr: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOkdnVoo1JZxM3ZIw11KaQno61mag50VxycvqZ-kY6OC0oZ3tef1gJJYAnStaLlLsmaLvzIlR6KKRK/pub?gid=1967929524&single=true&output=csv',
                    du: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOkdnVoo1JZxM3ZIw11KaQno61mag50VxycvqZ-kY6OC0oZ3tef1gJJYAnStaLlLsmaLvzIlR6KKRK/pub?gid=330421505&single=true&output=csv',
                    zn: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOkdnVoo1JZxM3ZIw11KaQno61mag50VxycvqZ-kY6OC0oZ3tef1gJJYAnStaLlLsmaLvzIlR6KKRK/pub?gid=597359201&single=true&output=csv',
                    ja: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOkdnVoo1JZxM3ZIw11KaQno61mag50VxycvqZ-kY6OC0oZ3tef1gJJYAnStaLlLsmaLvzIlR6KKRK/pub?gid=1140262731&single=true&output=csv',
                    ko: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOkdnVoo1JZxM3ZIw11KaQno61mag50VxycvqZ-kY6OC0oZ3tef1gJJYAnStaLlLsmaLvzIlR6KKRK/pub?gid=961009172&single=true&output=csv',
                    it: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOkdnVoo1JZxM3ZIw11KaQno61mag50VxycvqZ-kY6OC0oZ3tef1gJJYAnStaLlLsmaLvzIlR6KKRK/pub?gid=1885756520&single=true&output=csv',
                    vi: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOkdnVoo1JZxM3ZIw11KaQno61mag50VxycvqZ-kY6OC0oZ3tef1gJJYAnStaLlLsmaLvzIlR6KKRK/pub?gid=37768217&single=true&output=csv',
                    th: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOkdnVoo1JZxM3ZIw11KaQno61mag50VxycvqZ-kY6OC0oZ3tef1gJJYAnStaLlLsmaLvzIlR6KKRK/pub?gid=369450170&single=true&output=csv',
                    id: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOkdnVoo1JZxM3ZIw11KaQno61mag50VxycvqZ-kY6OC0oZ3tef1gJJYAnStaLlLsmaLvzIlR6KKRK/pub?gid=1467238039&single=true&output=csv'
                },

                sliders: { hero: [], breakfast: [], lunch: [], sweets: [] },
                categoriesList: [],

                get isRTL() { return ['ar', 'ur', 'fa', 'he'].includes(this.currentLang); },
                
                t(key) {
                    const dict = this.uiDict[this.currentLang] || this.uiDict['en'];
                    return dict[key] || this.uiDict['ar'][key] || key;
                },

                playSound(type) {
                    const el = document.getElementById('sfx-' + type);
                    if(el) { el.volume = 0.3; el.currentTime = 0; el.play().catch(e => {}); }
                },

                async changeLanguage() {
                    this.isLoading = true;
                    try {
                        const res = await fetch(this.langLinks[this.currentLang]);
                        const text = await res.text();
                        const rows = text.split('\n').slice(1);
                        
                        this.menuItems = rows.map(row => {
                            const cols = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || row.split(',');
                            return {
                                id: (cols[0] || '').replace(/"/g, '').trim(),
                                category: (cols[1] || '').replace(/"/g, '').trim(),
                                name: (cols[2] || '').replace(/"/g, '').trim(),
                                price: (cols[3] || '').replace(/"/g, '').trim(),
                                description: (cols[5] || '').replace(/"/g, '').trim(),
                                image: (cols[6] || '').replace(/"/g, '').trim() || 'https://via.placeholder.com/600x800/111/D4AF37?text=Taksim'
                            }
                        }).filter(i => i.id && i.id.startsWith('TP-'));

                        this.categoriesList = [...new Set(this.menuItems.map(i => i.category))];

                        // فلترة الهيرو بناءً على قائمة الأطباق العالمية والمميزة التي زودتني بها
                        const globalDishes = ['ترياكي', 'بشاميل', 'كاجون', 'كاري', 'مكسيكان', 'فنجرز', 'ترياكي', 'شانتيل', 'كباب البرنسيسة', 'ديانا', 'تشاينا', 'سلمون', 'كفتة', 'فاجيتا', 'قاورما', 'لحم على ورق', 'أحلام الأناناس', 'شاتو شو', 'نابيل'];
                        
                        this.sliders.hero = this.menuItems.filter(i => globalDishes.some(d => i.name.includes(d)));
                        if(this.sliders.hero.length === 0) this.sliders.hero = this.menuItems.slice(0, 8);

                        this.sliders.breakfast = this.menuItems.filter(i => i.category.includes('فطور') || i.category.includes('بيض')).slice(0, 6);
                        this.sliders.lunch = this.menuItems.filter(i => i.category.includes('مشويات') || i.category.includes('طواجن')).slice(0, 6);
                        this.sliders.sweets = this.menuItems.filter(i => i.category.includes('حلويات') || i.category.includes('عصائر')).slice(0, 6);

                        this.startAutoScroll();
                    } catch (e) { console.error(e); }
                    this.isLoading = false;
                },

                startAutoScroll() {
                    ['hero-slider', 'breakfast-slider', 'lunch-slider', 'sweets-slider'].forEach(id => {
                        const el = document.getElementById(id);
                        if(el) {
                            setInterval(() => {
                                if(el.scrollLeft + el.clientWidth >= el.scrollWidth - 5) el.scrollTo({left: 0, behavior: 'smooth'});
                                else el.scrollBy({left: this.isRTL ? -el.clientWidth : el.clientWidth, behavior: 'smooth'});
                            }, 7000); // 7 ثواني بالضبط
                        }
                    });
                },

                openSection(catId, soundType) {
                    this.playSound(soundType || 'pop');
                    this.menuFilter = catId || 'الكل';
                    this.view = 'menu';
                    window.scrollTo({top:0});
                },

                get currentMenuItems() {
                    return (this.menuFilter === 'الكل') ? this.menuItems : this.menuItems.filter(i => i.category === this.menuFilter);
                },

                get likedItemsList() { return this.likes.map(id => this.menuItems.find(i => i.id === id)).filter(Boolean); },

                toggleLike(item) {
                    this.playSound('pop');
                    this.likes = this.likes.includes(item.id) ? this.likes.filter(id => id !== item.id) : [...this.likes, item.id];
                    localStorage.setItem('taksim_likes', JSON.stringify(this.likes));
                },

                isLiked(id) { return this.likes.includes(id); },

                shareItem(item) {
                    this.playSound('pop');
                    const url = window.location.origin + window.location.pathname + '?item=' + item.id;
                    if (navigator.share) navigator.share({ title: item.name, url: url });
                    else { navigator.clipboard.writeText(url); alert('تم نسخ الرابط!'); }
                },

                copyOrder() {
                    let text = "طلبي من تقسيم بوينت:\n\n";
                    this.likedItemsList.forEach(item => text += `- ${item.name} | ${item.price} SR\n`);
                    navigator.clipboard.writeText(text).then(() => alert('تم النسخ!'));
                },

                initApp() { this.changeLanguage(); }
            }
        }
    </script>
