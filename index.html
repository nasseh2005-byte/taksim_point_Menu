<!DOCTYPE html>
<html lang="ar" dir="rtl" x-data="taksimApp()">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Taksim Point | المنيو الرقمي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #D4AF37; --bg: #050505; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg); color: white; -webkit-tap-highlight-color: transparent; }
        [x-cloak] { display: none !important; }
        
        /* إخفاء شريط التمرير */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .glass-panel { background: rgba(10, 10, 10, 0.85); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(212, 175, 55, 0.2); }
        .gold-gradient { background: linear-gradient(to right, #BF953F, #FCF6BA, #B38728); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* وضع تيك توك */
        .tiktok-container { height: 100dvh; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .tiktok-item { height: 100dvh; width: 100%; scroll-snap-align: start; position: relative; }
        
        /* تنسيق شرائح العرض */
        .slider-container { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scroll-behavior: smooth; }
        .slide { min-width: 100%; scroll-snap-align: center; }
    </style>
</head>
<body class="overflow-x-hidden relative" :dir="isRTL ? 'rtl' : 'ltr'" x-init="initApp()">

    <nav class="fixed top-0 w-full z-50 glass-panel px-4 py-3 flex justify-between items-center" x-show="view !== 'tiktok'">
        <img src="https://cdn.phototourl.com/free/2026-04-06-d0b6c388-fcdf-40fd-a7dc-56a84b8309a2.png" alt="Taksim Point" class="h-10 object-contain drop-shadow-md">
        
        <select x-model="currentLang" @change="changeLanguage()" class="bg-black/80 text-[#D4AF37] border border-[#D4AF37]/50 rounded-lg px-2 py-1 text-sm outline-none font-bold">
            <template x-for="(url, code) in langLinks" :key="code">
                <option :value="code" x-text="langNames[code]"></option>
            </template>
        </select>
    </nav>

    <div x-show="isLoading" class="fixed inset-0 z-[200] bg-black flex flex-col items-center justify-center">
        <img src="https://cdn.phototourl.com/free/2026-04-06-d0b6c388-fcdf-40fd-a7dc-56a84b8309a2.png" class="h-20 mb-6 animate-pulse">
        <div class="text-[#D4AF37] text-xl font-bold" x-text="t('loading')"></div>
    </div>

    <div x-show="view === 'home' && !isLoading" x-transition class="pb-28 pt-16">
        
        <section class="relative h-[45vh] w-full mb-6">
            <div class="slider-container h-full no-scrollbar" id="hero-slider">
                <template x-for="item in sliders.hero" :key="item.id">
                    <div class="slide relative h-full">
                        <img :src="item.image" onerror="this.src='https://images.unsplash.com/photo-1544025162-d76694265947?w=800'" class="w-full h-full object-cover opacity-60">
                        <div class="absolute inset-0 bg-gradient-to-t from-[#050505] via-black/40 to-transparent flex flex-col justify-end p-6">
                            <span class="bg-[#D4AF37] text-black text-[10px] font-black px-2 py-1 rounded w-max mb-2" x-text="t('hero_tag')"></span>
                            <h2 class="text-3xl font-black text-white mb-1 shadow-black drop-shadow-lg" x-text="item.name"></h2>
                            <p class="text-gray-300 text-sm mb-3 line-clamp-2" x-text="item.description"></p>
                            <div class="flex justify-between items-center">
                                <span class="text-2xl font-bold text-[#D4AF37]" x-text="item.price + ' SR'"></span>
                                <button @click="openSection(item.category)" class="bg-white/10 backdrop-blur border border-white/20 px-4 py-2 rounded-full text-sm font-bold" x-text="t('view_section')"></button>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </section>

        <section class="px-4 mb-10">
            <h3 class="text-2xl font-black mb-4 flex items-center gap-2">
                <span class="w-1.5 h-6 bg-[#D4AF37] rounded-full"></span>
                <span x-text="t('breakfast_title')"></span>
            </h3>
            
            <div class="slider-container rounded-2xl overflow-hidden h-48 mb-4 border border-white/10" id="breakfast-slider">
                <template x-for="item in sliders.breakfast" :key="item.id">
                    <div class="slide relative">
                        <img :src="item.image" onerror="this.src='https://images.unsplash.com/photo-1533089860892-a7c6f0a88666?w=800'" class="w-full h-full object-cover opacity-70">
                        <div class="absolute inset-0 bg-gradient-to-t from-black via-black/20 p-4 flex flex-col justify-end">
                            <h4 class="text-xl font-bold gold-gradient" x-text="item.name"></h4>
                            <div class="flex justify-between items-center w-full">
                                <span class="text-white font-bold" x-text="item.price + ' SR'"></span>
                                <button @click="openSection(item.category)" class="bg-[#D4AF37] text-black text-xs font-bold px-3 py-1 rounded-full" x-text="t('view_section')"></button>
                            </div>
                        </div>
                    </div>
                </template>
            </div>

            <div class="flex gap-2 overflow-x-auto no-scrollbar snap-x">
                <template x-for="cat in ['الفطور', 'البيض', 'الفول والفلافل', 'مقبلات']">
                    <button @click="openSection(cat)" class="snap-center min-w-[100px] bg-white/5 border border-white/10 rounded-xl p-3 flex flex-col items-center justify-center gap-2 active:bg-[#D4AF37]/20">
                        <span class="text-xl">🍳</span>
                        <span class="text-[11px] font-bold" x-text="cat"></span>
                    </button>
                </template>
            </div>
        </section>

        <section class="px-4 mb-10">
            <h3 class="text-2xl font-black mb-4 flex items-center gap-2">
                <span class="w-1.5 h-6 bg-red-600 rounded-full"></span>
                <span x-text="t('lunch_title')"></span>
            </h3>
            
            <div class="slider-container rounded-2xl overflow-hidden h-56 mb-4 border border-white/10" id="lunch-slider">
                <template x-for="item in sliders.lunch" :key="item.id">
                    <div class="slide relative">
                        <img :src="item.image" class="w-full h-full object-cover opacity-80">
                        <div class="absolute inset-0 bg-gradient-to-t from-black via-black/40 p-5 flex flex-col justify-end">
                            <h4 class="text-2xl font-bold text-white mb-1 drop-shadow" x-text="item.name"></h4>
                            <div class="flex justify-between items-center w-full mt-2">
                                <span class="text-[#D4AF37] font-black text-lg" x-text="item.price + ' SR'"></span>
                                <button @click="openSection(item.category)" class="bg-[#D4AF37] text-black text-xs font-bold px-4 py-2 rounded-full" x-text="t('view_section')"></button>
                            </div>
                        </div>
                    </div>
                </template>
            </div>

            <div class="flex gap-2 overflow-x-auto no-scrollbar snap-x">
                <template x-for="cat in ['المشويات', 'الشاورما', 'البرجر', 'الستيك', 'طواجن', 'البيتزا']">
                    <button @click="openSection(cat)" class="snap-center min-w-[100px] bg-white/5 border border-white/10 rounded-xl p-3 flex flex-col items-center justify-center gap-2">
                        <span class="text-xl">🥩</span>
                        <span class="text-[11px] font-bold" x-text="cat"></span>
                    </button>
                </template>
            </div>
        </section>

        <section class="px-4 mb-10">
            <h3 class="text-2xl font-black mb-4 flex items-center gap-2">
                <span class="w-1.5 h-6 bg-blue-400 rounded-full"></span>
                <span x-text="t('sweets_title')"></span>
            </h3>
            
            <div class="slider-container rounded-2xl overflow-hidden h-48 mb-4 border border-white/10" id="sweets-slider">
                <template x-for="item in sliders.sweets" :key="item.id">
                    <div class="slide relative">
                        <img :src="item.image" class="w-full h-full object-cover opacity-70">
                        <div class="absolute inset-0 bg-gradient-to-t from-black p-4 flex flex-col justify-end">
                            <h4 class="text-lg font-bold text-white" x-text="item.name"></h4>
                            <div class="flex justify-between items-center w-full">
                                <span class="text-[#D4AF37] font-bold" x-text="item.price + ' SR'"></span>
                                <button @click="openSection(item.category)" class="bg-blue-500 text-white text-xs font-bold px-3 py-1 rounded-full" x-text="t('view_section')"></button>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
            
            <div class="flex gap-2 overflow-x-auto no-scrollbar snap-x">
                <template x-for="cat in ['الحلويات', 'العصائر', 'القهوة', 'مشروبات ساخنة']">
                    <button @click="openSection(cat)" class="snap-center min-w-[100px] bg-white/5 border border-white/10 rounded-xl p-3 flex flex-col items-center justify-center gap-2">
                        <span class="text-xl">🍰</span>
                        <span class="text-[11px] font-bold" x-text="cat"></span>
                    </button>
                </template>
            </div>
        </section>

        <footer class="mt-12 mb-6 text-center">
            <div class="flex justify-center gap-6 mb-4">
                <a href="https://www.tiktok.com/@taksim_point" target="_blank" class="text-gray-400 hover:text-white transition"><svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64 2.93 2.93 0 0 1 .88.13V9.4a6.84 6.84 0 0 0-1-.05A6.33 6.33 0 0 0 5 20.1a6.34 6.34 0 0 0 10.86-4.43v-7a8.16 8.16 0 0 0 4.77 1.52v-3.4a4.85 4.85 0 0 1-1.04-.1z"/></svg></a>
                <a href="https://www.instagram.com/taksim_point" target="_blank" class="text-gray-400 hover:text-white transition"><svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg></a>
                <a href="https://www.youtube.com/channel/UCa6QUKNGNa4FKSOxhSeyxiQ" target="_blank" class="text-gray-400 hover:text-white transition"><svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.5 12 3.5 12 3.5s-7.505 0-9.377.55a3.016 3.016 0 0 0-2.122 2.136C0 8.07 0 12 0 12s0 3.93.501 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.55 9.377.55 9.377.55s7.505 0 9.377-.55a3.016 3.016 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg></a>
                <a href="https://www.facebook.com/taksimpointrestaurants" target="_blank" class="text-gray-400 hover:text-white transition"><svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M22.675 0H1.325C.593 0 0 .593 0 1.325v21.351C0 23.407.593 24 1.325 24H12.82v-9.294H9.692v-3.622h3.128V8.413c0-3.1 1.893-4.788 4.659-4.788 1.325 0 2.463.099 2.795.143v3.24l-1.918.001c-1.504 0-1.795.715-1.795 1.763v2.313h3.587l-.467 3.622h-3.12V24h6.116c.73 0 1.323-.593 1.323-1.325V1.325C24 .593 23.407 0 22.675 0z"/></svg></a>
            </div>
            <a href="https://taksimpoint.sa/locations/" target="_blank" class="text-[#D4AF37] text-xs underline font-bold">📍 فروع تقسيم بوينت (المواقع)</a>
        </footer>
    </div>

    <div x-show="view === 'tiktok'" x-cloak class="tiktok-container relative">
        
        <div class="fixed top-0 w-full z-[100] bg-gradient-to-b from-black to-transparent pt-4 pb-10 px-2">
            <div class="flex gap-3 overflow-x-auto no-scrollbar">
                <button @click="filterTikTok('الكل')" :class="tiktokFilter === 'الكل' ? 'text-black bg-[#D4AF37]' : 'text-white bg-black/50'" class="px-4 py-1.5 rounded-full text-sm font-bold backdrop-blur border border-white/20 whitespace-nowrap" x-text="t('all_items')"></button>
                <template x-for="cat in categoriesList" :key="cat">
                    <button @click="filterTikTok(cat)" :class="tiktokFilter === cat ? 'text-black bg-[#D4AF37]' : 'text-white bg-black/50'" class="px-4 py-1.5 rounded-full text-sm font-bold backdrop-blur border border-white/20 whitespace-nowrap" x-text="cat"></button>
                </template>
            </div>
        </div>

        <template x-for="item in tiktokItems" :key="item.id">
            <div class="tiktok-item" :id="'item-' + item.id">
                <img :src="item.image" loading="lazy" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-black via-black/30 to-transparent flex flex-col justify-end p-5 pb-28">
                    <span class="text-[#D4AF37] text-sm font-bold drop-shadow-md mb-1" x-text="item.category"></span>
                    <h2 class="text-3xl font-black mb-2 shadow-black drop-shadow-xl" x-text="item.name"></h2>
                    <p class="text-gray-200 text-sm mb-4 max-w-[80%] drop-shadow-md line-clamp-3" x-text="item.description"></p>
                    <span class="text-3xl font-bold text-[#D4AF37] drop-shadow-lg" x-text="item.price + ' SR'"></span>
                    
                    <div class="absolute right-4 bottom-32 flex flex-col items-center gap-6">
                        <div class="flex flex-col items-center gap-1">
                            <button @click="toggleLike(item)" class="bg-black/40 backdrop-blur p-3 rounded-full border border-white/20 transition active:scale-75">
                                <span class="text-3xl" x-text="isLiked(item.id) ? '❤️' : '🤍'"></span>
                            </button>
                            <span class="text-[10px] font-bold drop-shadow-md" x-text="likes.length"></span>
                        </div>
                        
                        <div class="flex flex-col items-center gap-1">
                            <button @click="shareItem(item)" class="bg-black/40 backdrop-blur p-3 rounded-full border border-white/20 transition active:scale-75">
                                <span class="text-2xl">🔗</span>
                            </button>
                            <span class="text-[10px] font-bold drop-shadow-md" x-text="t('share')"></span>
                        </div>
                    </div>
                </div>
            </div>
        </template>
    </div>

    <div x-show="view === 'likes'" x-transition x-cloak class="min-h-screen pt-20 pb-28 px-4">
        <h2 class="text-2xl font-black text-center mb-6 gold-text" x-text="t('nav_likes')"></h2>

        <div x-show="likes.length === 0" class="text-center mt-20 text-gray-500 font-bold" x-text="t('empty_likes')"></div>

        <div class="flex flex-col gap-3 mb-8">
            <template x-for="item in likedItemsList" :key="item.id">
                <div class="glass-panel p-4 rounded-xl flex justify-between items-center">
                    <img :src="item.image" class="w-16 h-16 rounded-lg object-cover">
                    <div class="flex-1 px-4">
                        <h4 class="font-bold text-sm" x-text="item.name"></h4>
                        <span class="text-[#D4AF37] text-xs font-bold" x-text="item.price + ' SR'"></span>
                    </div>
                    <button @click="toggleLike(item)" class="text-red-500 bg-red-500/10 p-2 rounded-lg text-xl">🗑️</button>
                </div>
            </template>
        </div>

        <button x-show="likes.length > 0" @click="copyOrder()" class="w-full bg-[#D4AF37] text-black font-black py-4 rounded-xl text-lg shadow-[0_0_20px_rgba(212,175,55,0.4)] active:scale-95 transition" x-text="t('copy_order')"></button>
    </div>

    <div class="fixed bottom-0 w-full glass-panel border-t border-white/10 px-6 py-3 z-[150]">
        <div class="flex justify-between items-center max-w-sm mx-auto">
            <button @click="view = 'home'" :class="view === 'home' ? 'text-[#D4AF37]' : 'text-gray-400'" class="flex flex-col items-center gap-1">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 3l9 7.5v10.5h-6v-6h-6v6h-6v-10.5z"/></svg>
                <span class="text-[10px] font-bold" x-text="t('nav_home')"></span>
            </button>
            
            <button @click="view = 'tiktok'; tiktokFilter = 'الكل'" :class="view === 'tiktok' ? 'text-[#D4AF37]' : 'text-gray-400'" class="flex flex-col items-center gap-1 -mt-4">
                <div class="bg-gradient-to-tr from-[#D4AF37] to-yellow-200 p-3 rounded-full shadow-lg text-black">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16m-7 6h7"></path></svg>
                </div>
                <span class="text-[10px] font-bold" x-text="t('nav_tiktok')"></span>
            </button>

            <button @click="view = 'likes'" :class="view === 'likes' ? 'text-[#D4AF37]' : 'text-gray-400'" class="flex flex-col items-center gap-1 relative">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                <span x-show="likes.length > 0" class="absolute -top-1 -right-2 bg-red-600 text-white text-[10px] font-bold w-4 h-4 rounded-full flex items-center justify-center" x-text="likes.length"></span>
                <span class="text-[10px] font-bold" x-text="t('nav_likes')"></span>
            </button>
        </div>
    </div>

    <script>
        function taksimApp() {
            return {
                isLoading: true,
                view: 'home', 
                currentLang: 'ar',
                menuItems: [],
                tiktokFilter: 'الكل',
                likes: JSON.parse(localStorage.getItem('taksim_likes') || '[]'),
                
                // قاموس الترجمة للواجهة الثابتة (UI Translation)
                uiDict: {
                    ar: {
                        hero_tag: "استمتع بوجبات تقسيم بوينت مميزه ✨",
                        breakfast_title: "صباحك مع تقسيم بوينت 🌅",
                        lunch_title: "غدائك مع تقسيم بوينت 🍽️",
                        sweets_title: "حلاوتك من تقسيم بوينت 🍰",
                        view_section: "تصفح القسم",
                        all_items: "الجميع",
                        nav_home: "الرئيسية",

                    en: {

                        breakfast_title: "Morning with Taksim Point 🌅",
                        lunch_title: "Lunch with Taksim Point 🍽️",
                        sweets_title: "Taksim Sweets & Drinks 🍰",
                        view_section: "View",
                        all_items: "All",
                        nav_home: "Home",
                        nav_tiktok: "Menu",
                        nav_likes: "My Orders",
                        share: "Share",
                        copy_order: "📋 Copy Order for Waiter",
                        loading: "Loading Menu...",
                        empty_likes: "No items selected. Tap the heart to add some!"
                    },
                    tr: {
                        hero_tag: "Taksim'in Özel Yemekleri ✨",
                        breakfast_title: "Taksim Point ile Sabah 🌅",
                        lunch_title: "Taksim Point ile Öğle Yemeği 🍽️",
                        sweets_title: "Taksim Tatlıları 🍰",
                        view_section: "İncele",
                        all_items: "Tümü",
                        nav_home: "Ana Sayfa",
                        nav_tiktok: "Menü",
                        nav_likes: "Siparişlerim",
                        share: "Paylaş",
                        copy_order: "📋 Siparişi Kopyala",
                        loading: "Menü Yükleniyor...",
                        empty_likes: "Henüz ürün seçilmedi."
                    }
                },

                langNames: {
                    ar: 'العربية', en: 'English', tr: 'Türkçe', es: 'Español', ru: 'Русский', 
                    ur: 'اردو', hi: 'हिन्दी', fr: 'Français', du: 'Deutsch', zn: '中文', 
                    ja: '日本語', ko: '한국어', it: 'Italiano', vi: 'Tiếng Việt', th: 'ไทย', id: 'Indonesia'
                },

                langLinks: {
                    ar: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOkdnVoo1JZxM3ZIw11KaQno61mag50VxycvqZ-kY6OC0oZ3tef1gJJYAnStaLlLsmaLvzIlR6KKRK/pub?gid=2026156602&single=true&output=csv',
                    en: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOkdnVoo1JZxM3ZIw11KaQno61mag50VxycvqZ-kY6OC0oZ3tef1gJJYAnStaLlLsmaLvzIlR6KKRK/pub?gid=1709873212&single=true&output=csv',
                    tr: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOkdnVoo1JZxM3ZIw11KaQno61mag50VxycvqZ-kY6OC0oZ3tef1gJJYAnStaLlLsmaLvzIlR6KKRK/pub?gid=932024028&single=true&output=csv',
                    es: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOkdnVoo1JZxM3ZIw11KaQno61mag50VxycvqZ-kY6OC0oZ3tef1gJJYAnStaLlLsmaLvzIlR6KKRK/pub?gid=2126154876&single=true&output=csv',
                    ru: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOkdnVoo1JZxM3ZIw11KaQno61mag50VxycvqZ-kY6OC0oZ3tef1gJJYAnStaLlLsmaLvzIlR6KKRK/pub?gid=1383179966&single=true&output=csv',
                    ur: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOkdnVoo1JZxM3ZIw11KaQno61mag50VxycvqZ-kY6OC0oZ3tef1gJJYAnStaLlLsmaLvzIlR6KKRK/pub?gid=1356221249&single=true&output=csv',
                    hi: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOkdnVoo1JZxM3ZIw11KaQno61mag50VxycvqZ-kY6OC0oZ3tef1gJJYAnStaLlLsmaLvzIlR6KKRK/pub?gid=1947060246&single=true&output=csv',
                    fr: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOkdnVoo1JZxM3ZIw11KaQno61mag50VxycvqZ-kY6OC0oZ3tef1gJJYAnStaLlLsmaLvzIlR6KKRK/pub?gid=1967929524&single=true&output=csv',
                    du: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOkdnVoo1JZxM3ZIw11KaQno61mag50VxycvqZ-kY6OC0oZ3tef1gJJYAnStaLlLsmaLvzIlR6KKRK/pub?gid=330421505&single=true&output=csv',
                    zn: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOkdnVoo1JZxM3ZIw11KaQno61mag50VxycvqZ-kY6OC0oZ3tef1gJJYAnStaLlLsmaLvzIlR6KKRK/pub?gid=597359201&single=true&output=csv',
                    ja: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOkdnVoo1JZxM3ZIw11KaQno61mag50VxycvqZ-kY6OC0oZ3tef1gJJYAnStaLlLsmaLvzIlR6KKRK/pub?gid=1140262731&single=true&output=csv',
                    ko: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOkdnVoo1JZxM3ZIw11KaQno61mag50VxycvqZ-kY6OC0oZ3tef1gJJYAnStaLlLsmaLvzIlR6KKRK/pub?gid=961009172&single=true&output=csv',
                    it: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOkdnVoo1JZxM3ZIw11KaQno61mag50VxycvqZ-kY6OC0oZ3tef1gJJYAnStaLlLsmaLvzIlR6KKRK/pub?gid=1885756520&single=true&output=csv',
                    vi: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOkdnVoo1JZxM3ZIw11KaQno61mag50VxycvqZ-kY6OC0oZ3tef1gJJYAnStaLlLsmaLvzIlR6KKRK/pub?gid=37768217&single=true&output=csv',
                    th: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOkdnVoo1JZxM3ZIw11KaQno61mag50VxycvqZ-kY6OC0oZ3tef1gJJYAnStaLlLsmaLvzIlR6KKRK/pub?gid=369450170&single=true&output=csv',
                    id: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOkdnVoo1JZxM3ZIw11KaQno61mag50VxycvqZ-kY6OC0oZ3tef1gJJYAnStaLlLsmaLvzIlR6KKRK/pub?gid=1467238039&single=true&output=csv'
                },

                sliders: { hero: [], breakfast: [], lunch: [], sweets: [] },
                categoriesList: [],

                get isRTL() {
                    return ['ar', 'ur', 'fa', 'he'].includes(this.currentLang);
                },

                t(key) {
                    const dict = this.uiDict[this.currentLang] || this.uiDict['en'];
                    return dict[key] || key;
                },

                async changeLanguage() {
                    this.isLoading = true;
                    try {
                        const res = await fetch(this.langLinks[this.currentLang]);
                        if (!res.ok) throw new Error("Network response was not ok");
                        const text = await res.text();
                        const rows = text.split('\n').slice(1);
                        
                        this.menuItems = rows.map(row => {
                            // تجاهل الفواصل داخل علامات الاقتباس (حماية البيانات)
                            const cols = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || row.split(',');
                            return {
                                id: (cols[0] || '').replace(/"/g, '').trim(),
                                category: (cols[1] || '').replace(/"/g, '').trim(),
                                name: (cols[2] || '').replace(/"/g, '').trim(),
                                price: (cols[3] || '').replace(/"/g, '').trim(),
                                description: (cols[5] || '').replace(/"/g, '').trim(),
                                image: (cols[6] || '').replace(/"/g, '').trim() || 'https://via.placeholder.com/600x800/111/D4AF37?text=Taksim'
                            }
                        }).filter(i => i.id && i.id.startsWith('TP-'));

                        this.categoriesList = [...new Set(this.menuItems.map(i => i.category))];

                        // توزيع الشرائح العلوية التلقائية
                        this.sliders.hero = this.menuItems.filter(i => i.category.includes('عالمي') || i.category.includes('مميز') || i.category.includes('Global') || i.category.includes('Special')).slice(0, 5);
                        if(this.sliders.hero.length === 0) this.sliders.hero = this.menuItems.slice(0, 5); // Fallback

                        this.sliders.breakfast = this.menuItems.filter(i => i.category.includes('فطور') || i.category.includes('Breakfast') || i.category.includes('Kahvaltı')).slice(0, 5);
                        
                        this.sliders.lunch = this.menuItems.filter(i => ['المشويات', 'الشاورما', 'البرجر', 'Grills', 'Shawarma'].some(c => i.category.includes(c))).slice(0, 5);
                        
                        this.sliders.sweets = this.menuItems.filter(i => ['الحلويات', 'العصائر', 'القهوة', 'Desserts', 'Drinks'].some(c => i.category.includes(c))).slice(0, 5);

                        this.startAutoScroll();
                        this.checkDeepLink();
                    } catch (e) {
                        console.error('Data Fetch Error:', e);
                    }
                    this.isLoading = false;
                },

                startAutoScroll() {
                    const scrollElements = ['hero-slider', 'breakfast-slider', 'lunch-slider', 'sweets-slider'];
                    scrollElements.forEach(id => {
                        const el = document.getElementById(id);
                        if(el) {
                            setInterval(() => {
                                if(el.scrollLeft + el.clientWidth >= el.scrollWidth) {
                                    el.scrollTo({left: 0, behavior: 'smooth'});
                                } else {
                                    el.scrollBy({left: this.isRTL ? -el.clientWidth : el.clientWidth, behavior: 'smooth'});
                                }
                            }, Math.random() * 2000 + 3000); // بين 3 و 5 ثواني
                        }
                    });
                },

                openSection(cat) {
                    this.tiktokFilter = cat;
                    this.view = 'tiktok';
                    window.scrollTo({top:0});
                },

                get tiktokItems() {
                    if (this.tiktokFilter === 'الكل' || this.tiktokFilter === 'All' || this.tiktokFilter === 'Tümü') return this.menuItems;
                    return this.menuItems.filter(i => i.category === this.tiktokFilter);
                },

                get likedItemsList() {
                    return this.likes.map(id => this.menuItems.find(i => i.id === id)).filter(Boolean);
                },

                toggleLike(item) {
                    if(this.likes.includes(item.id)) {
                        this.likes = this.likes.filter(id => id !== item.id);
                    } else {
                        this.likes.push(item.id);
                    }
                    localStorage.setItem('taksim_likes', JSON.stringify(this.likes));
                },

                isLiked(id) { return this.likes.includes(id); },

                shareItem(item) {
                    const url = window.location.origin + window.location.pathname + '?item=' + item.id;
                    if (navigator.share) {
                        navigator.share({
                            title: item.name,
                            text: 'شاهد هذا الطبق من تقسيم بوينت!',
                            url: url
                        }).catch(console.error);
                    } else {
                        navigator.clipboard.writeText(url);
                        alert('تم نسخ رابط الطبق للمشاركة!');
                    }
                },

                copyOrder() {
                    let text = "طلبي من تقسيم بوينت:\n\n";
                    this.likedItemsList.forEach(item => {
                        text += `- ${item.name} | ${item.price} SR\n`;
                    });
                    navigator.clipboard.writeText(text).then(() => {
                        alert(this.currentLang === 'ar' ? 'تم نسخ الطلب بنجاح!' : 'Order Copied!');
                    });
                },

                checkDeepLink() {
                    const urlParams = new URLSearchParams(window.location.search);
                    const itemId = urlParams.get('item');
                    if(itemId) {
                        this.view = 'tiktok';
                        this.tiktokFilter = 'الكل';
                        setTimeout(() => {
                            const el = document.getElementById('item-' + itemId);
                            if(el) el.scrollIntoView({ behavior: 'smooth' });
                        }, 500);
                    }
                },

                initApp() { this.changeLanguage(); }
            }
        }
    </script>
