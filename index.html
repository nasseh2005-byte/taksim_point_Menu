<!DOCTYPE html>
<html lang="ar" dir="rtl" x-data="taksimApp()">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Taksim Point | المنيو الرقمي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #D4AF37; --bg: #050505; }
        
        body { 
            font-family: 'Cairo', sans-serif; background-color: var(--bg); 
            background-image: radial-gradient(circle at 15% 50%, rgba(255, 255, 255, 0.03) 0%, transparent 50%), radial-gradient(circle at 85% 30%, rgba(212, 175, 55, 0.05) 0%, transparent 50%), url('https://www.transparenttextures.com/patterns/black-marble.png');
            color: white; -webkit-tap-highlight-color: transparent; scroll-behavior: smooth;
        }
        
        [x-cloak] { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .glass-nav { background: rgba(5, 5, 5, 0.9); backdrop-filter: blur(25px); border-bottom: 1px solid rgba(212, 175, 55, 0.2); }
        .gold-gradient { background: linear-gradient(135deg, #BF953F, #FCF6BA, #B38728); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .slider-container { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; }
        .slide { min-width: 100%; scroll-snap-align: center; }

        .tiktok-container { height: 100dvh; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .tiktok-item { height: 100dvh; scroll-snap-align: start; position: relative; }
        
        /* تدرج خلفيات الأقسام مع الحفاظ على الأبعاد */
        .category-bg-blend { position: absolute; inset: 0; z-index: 0; opacity: 0.4; mask-image: linear-gradient(to bottom, black 30%, transparent 100%); -webkit-mask-image: linear-gradient(to bottom, black 30%, transparent 100%); object-fit: cover; object-position: center; width: 100%; height: 100%; }
        
        /* كروت الأقسام الشفافة */
        .category-silhouette { filter: brightness(0.4) contrast(1.2) grayscale(0.5); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); object-fit: cover; object-position: center; }
        .cat-box:hover .category-silhouette { filter: brightness(0.8) contrast(1.2) grayscale(0); transform: scale(1.1); }
    </style>
</head>
<body class="overflow-x-hidden relative" :dir="isRTL ? 'rtl' : 'ltr'" x-init="initApp()">

    <nav class="fixed top-0 w-full z-[100] glass-nav px-3 py-3 flex justify-between items-center" x-show="view !== 'explore'">
        <img src="https://cdn.phototourl.com/free/2026-04-06-d0b6c388-fcdf-40fd-a7dc-56a84b8309a2.png" alt="Taksim Point" class="h-8 object-contain">
        
        <div class="flex items-center gap-1.5">
            <button @click="showQRModal = true" class="p-1 border border-[#D4AF37]/50 rounded text-[#D4AF37] hover:bg-[#D4AF37] hover:text-black transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm14 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"></path></svg>
            </button>
            
            <select x-model="currentBranch" @change="updateBranchData()" class="bg-black text-[#D4AF37] border border-[#D4AF37]/50 px-2 py-1 text-xs outline-none font-bold rounded max-w-[90px] truncate">
                <option value="alshati" x-text="t('branch_alshati')"></option>
                <option value="almanar" x-text="t('branch_almanar')"></option>
                <option value="aljawhara" x-text="t('branch_aljawhara')"></option>
            </select>

            <select x-model="currentLang" @change="changeLanguage()" class="bg-[#111] text-[#D4AF37] border border-[#D4AF37]/50 px-2 py-1 text-xs outline-none font-bold rounded">
                <template x-for="(url, code) in langLinks" :key="code">
                    <option :value="code" x-text="langNames[code]"></option>
                </template>
            </select>
        </div>
    </nav>

    <div x-show="showQRModal" x-cloak class="fixed inset-0 z-[200] bg-black/95 flex flex-col items-center justify-center p-6 backdrop-blur-sm">
        <button @click="showQRModal = false" class="absolute top-6 right-6 text-white text-3xl font-black">✕</button>
        <div class="bg-[#0a0a0a] border border-[#D4AF37]/30 p-8 rounded-2xl flex flex-col items-center shadow-[0_0_40px_rgba(212,175,55,0.2)]">
            <h2 class="text-[#D4AF37] font-black text-xl mb-1 text-center" x-text="t('branch_' + currentBranch)"></h2>
            <p class="text-gray-400 text-xs mb-6 text-center">قم بمسح الباركود للوصول السريع لهذا الفرع</p>
            <div class="bg-white p-3 rounded-xl mb-6">
                <img :src="'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + encodeURIComponent(getBranchUrl())" class="w-48 h-48">
            </div>
            <button @click="copyBranchUrl()" class="w-full bg-gradient-to-r from-[#D4AF37] to-yellow-600 text-black font-black py-3 rounded-lg flex items-center justify-center gap-2 transition active:scale-95">
                <span>🔗</span> نسخ رابط الفرع
            </button>
        </div>
    </div>

    <div x-show="isLoading" class="fixed inset-0 z-[200] bg-[#050505] flex flex-col items-center justify-center">
        <img src="https://cdn.phototourl.com/free/2026-04-06-d0b6c388-fcdf-40fd-a7dc-56a84b8309a2.png" class="h-20 mb-6 animate-pulse drop-shadow-[0_0_15px_rgba(212,175,55,0.5)]">
        <div class="text-[#D4AF37] text-sm font-bold tracking-widest uppercase">Taksim Point...</div>
    </div>

    <div x-show="hasError" x-cloak class="fixed inset-0 z-[300] bg-[#050505] flex flex-col items-center justify-center p-6 text-center">
        <span class="text-red-500 text-5xl mb-4">⚠️</span>
        <h2 class="text-xl font-bold text-white mb-2">عذراً، حدث خطأ في جلب القائمة</h2>
        <p class="text-gray-400 text-sm mb-6">يرجى التأكد من اتصالك بالإنترنت والمحاولة مجدداً.</p>
        <button @click="window.location.reload()" class="bg-[#D4AF37] text-black px-6 py-2 rounded-full font-bold">تحديث الصفحة</button>
    </div>

    <div x-show="view === 'home' && !isLoading && !hasError" x-transition.opacity.duration.500ms class="pb-32 pt-24">
        
        <section class="px-6 mb-12 text-center">
            <img src="https://cdn.phototourl.com/free/2026-04-06-d0b6c388-fcdf-40fd-a7dc-56a84b8309a2.png" class="h-20 mx-auto mb-6 object-contain drop-shadow-2xl">
            <h1 class="text-2xl font-black gold-gradient mb-4 text-center" x-text="t('about_title')"></h1>
            <p class="text-sm text-gray-300 leading-relaxed text-justify px-2 mb-4" x-text="t('about_p1')"></p>
            <p class="text-sm text-gray-300 leading-relaxed text-justify px-2" x-text="t('about_p2')"></p>
        </section>

        <section class="relative h-[35vh] w-full mb-12 px-4">
            <div class="slider-container h-full no-scrollbar rounded-xl border border-[#D4AF37]/20 shadow-[0_0_20px_rgba(0,0,0,0.8)]" id="hero-slider">
                <template x-for="(item, index) in heroOffers" :key="item.id">
                    <div class="slide relative h-full" :id="'hero-slide-' + index">
                        <img :src="item.image" loading="lazy" class="w-full h-full object-cover object-center opacity-80">
                        <div class="absolute inset-0 bg-gradient-to-t from-black via-black/50 to-transparent flex flex-col justify-end p-5">
                            <h2 class="text-2xl font-black text-white mb-1 drop-shadow-lg" x-text="item.name"></h2>
                            <p class="text-gray-300 text-xs line-clamp-2 mb-3" x-text="item.description"></p>
                            <div class="flex justify-between items-center">
                                <span class="text-xl font-bold text-[#D4AF37]" x-text="item.price + ' SR'"></span>
                                <button @click="openMenu(item.category)" class="bg-[#D4AF37] text-black px-4 py-1.5 text-xs font-bold rounded">الطلب ➔</button>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </section>

        <section class="px-5 mb-10">
            <h3 class="text-lg font-black mb-6 gold-gradient text-center uppercase tracking-widest" x-text="t('nav_menu')"></h3>
            <div class="grid grid-cols-2 gap-3">
                <template x-for="cat in normalCategories" :key="cat">
                    <button @click="openMenu(cat)" class="cat-box relative h-28 rounded-xl overflow-hidden border border-white/10 bg-[#111] flex items-center justify-center group">
                        <img :src="getCategoryBg(cat)" loading="lazy" class="absolute inset-0 w-full h-full category-silhouette">
                        <div class="absolute inset-0 bg-gradient-to-t from-black via-black/60 to-black/20"></div>
                        <span class="relative z-10 text-[#D4AF37] font-black text-sm text-center px-1 drop-shadow-[0_2px_2px_rgba(0,0,0,1)]" x-text="cat"></span>
                    </button>
                </template>
            </div>
        </section>
    </div>

    <div x-show="view === 'menu' && !hasError" x-cloak class="min-h-screen pt-20 pb-32">
        <div class="flex gap-2 overflow-x-auto no-scrollbar px-4 mb-4 pb-2 border-b border-white/10 sticky top-[68px] z-40 bg-[#050505]/90 backdrop-blur">
            <template x-for="cat in normalCategories" :key="cat">
                <button @click="scrollToCat(cat)" class="px-4 py-2 text-xs font-black whitespace-nowrap text-gray-400 hover:text-[#D4AF37] transition" x-text="cat"></button>
            </template>
        </div>

        <div class="px-4">
            <template x-for="cat in normalCategories" :key="cat">
                <div class="mb-12 relative rounded-2xl overflow-hidden bg-[#0c0c0c] border border-white/5" :id="'cat-' + btoa(unescape(encodeURIComponent(cat))).replace(/=/g, '')">
                    <img :src="getCategoryBg(cat)" loading="lazy" class="category-bg-blend">
                    
                    <div class="relative z-10 p-5">
                        <h2 class="text-3xl font-black mb-6 text-white drop-shadow-lg flex items-center gap-3">
                            <span class="w-1.5 h-8 bg-[#D4AF37]"></span>
                            <span x-text="cat"></span>
                        </h2>
                        
                        <div class="flex flex-col gap-4">
                            <template x-for="item in activeMenuItems.filter(i => i.category === cat)" :key="item.id">
                                <div class="flex justify-between items-start border-b border-white/10 pb-4 last:border-0">
                                    <div class="flex-1 pr-4">
                                        <h4 class="font-bold text-white text-base mb-1 drop-shadow" x-text="item.name"></h4>
                                        <p class="text-[11px] text-gray-300 leading-relaxed mb-2 w-full" x-text="item.description"></p>
                                        <span class="text-[#D4AF37] font-black text-sm" x-text="item.price + ' SR'"></span>
                                    </div>
                                    <button @click="toggleLike(item)" class="p-3 bg-black/60 rounded-full border border-white/10 active:scale-90 transition backdrop-blur flex-shrink-0">
                                        <span x-text="isLiked(item.id) ? '❤️' : '🤍'"></span>
                                    </button>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <div x-show="view === 'explore' && !hasError" x-cloak class="tiktok-container relative bg-black">
        <template x-for="item in activeExploreItems" :key="item.id">
            <div class="tiktok-item" :id="'explore-' + item.id">
                
                <template x-if="item.isSocial">
                    <div class="absolute inset-0 flex flex-col items-center justify-center p-8 bg-gradient-to-b from-[#0a0a0a] to-[#1a1a1a] z-50">
                        <img :src="item.image" class="h-28 mb-8 drop-shadow-[0_0_20px_rgba(212,175,55,0.4)]">
                        <h2 class="text-3xl font-black text-[#D4AF37] mb-4 text-center" x-text="item.name"></h2>
                        <p class="text-gray-300 text-center mb-10 text-sm leading-relaxed" x-text="item.description"></p>
                        
                        <div class="grid grid-cols-2 gap-4 w-full max-w-xs">
                            <a href="https://www.tiktok.com/@taksim_point" target="_blank" class="bg-[#111] border border-white/10 rounded-xl p-4 flex flex-col items-center gap-2 hover:border-[#D4AF37] transition">
                                <span class="text-2xl">🎵</span><span class="text-xs font-bold">TikTok</span>
                            </a>
                            <a href="https://www.instagram.com/taksim_point" target="_blank" class="bg-[#111] border border-white/10 rounded-xl p-4 flex flex-col items-center gap-2 hover:border-[#D4AF37] transition">
                                <span class="text-2xl">📸</span><span class="text-xs font-bold">Instagram</span>
                            </a>
                            <a href="https://www.youtube.com/channel/UCa6QUKNGNa4FKSOxhSeyxiQ" target="_blank" class="bg-[#111] border border-white/10 rounded-xl p-4 flex flex-col items-center gap-2 hover:border-[#D4AF37] transition">
                                <span class="text-2xl">▶️</span><span class="text-xs font-bold">YouTube</span>
                            </a>
                            <a href="https://taksimpoint.sa/locations/" target="_blank" class="bg-[#111] border border-white/10 rounded-xl p-4 flex flex-col items-center gap-2 hover:border-[#D4AF37] transition">
                                <span class="text-2xl">📍</span><span class="text-xs font-bold">Locations</span>
                            </a>
                        </div>
                    </div>
                </template>

                <template x-if="!item.isSocial">
                    <div class="w-full h-full relative">
                        <template x-if="item.isVideo || isVideo(item.image)">
                            <video :src="item.image" autoplay loop muted playsinline preload="metadata" class="w-full h-full object-cover object-center"></video>
                        </template>
                        <template x-if="!item.isVideo && !isVideo(item.image)">
                            <img :src="item.image" loading="lazy" class="w-full h-full object-cover object-center opacity-90">
                        </template>
                        
                        <div class="absolute inset-0 bg-gradient-to-t from-black via-black/40 to-transparent flex flex-col justify-end p-6 pb-32">
                            <span class="bg-red-600/80 backdrop-blur text-white text-[10px] font-bold px-2 py-1 rounded w-max mb-2 uppercase" x-text="t('nav_explore')"></span>
                            <h2 class="text-3xl font-black mb-2 text-white drop-shadow-xl" x-text="item.name"></h2>
                            <p class="text-gray-200 text-sm mb-4 max-w-[80%] drop-shadow-md line-clamp-3" x-text="item.description"></p>
                            <template x-if="item.price"><span class="text-2xl font-black text-[#D4AF37] drop-shadow-lg" x-text="item.price + ' SR'"></span></template>
                            
                            <div class="absolute right-4 bottom-32 flex flex-col gap-6 items-center">
                                <template x-if="!item.custom">
                                    <button @click="toggleLike(item)" class="bg-black/50 backdrop-blur p-4 rounded-full border border-white/20 active:scale-75 transition">
                                        <span class="text-3xl" x-text="isLiked(item.id) ? '❤️' : '🤍'"></span>
                                    </button>
                                </template>
                                <button @click="shareExplore(item.id)" class="bg-black/50 backdrop-blur p-4 rounded-full border border-white/20 active:scale-75 transition">
                                    <span class="text-2xl">🔗</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </template>

            </div>
        </template>
    </div>

    <div x-show="view === 'likes'" x-transition x-cloak class="min-h-screen pt-20 pb-32 px-4">
        <h2 class="text-2xl font-black text-center mb-8 gold-gradient uppercase" x-text="t('nav_likes')"></h2>
        <div x-show="likes.length === 0" class="text-center mt-20 text-gray-500 font-bold" x-text="t('empty_likes')"></div>

        <div class="flex flex-col gap-3 mb-10">
            <template x-for="item in likedItemsList" :key="item.id">
                <div class="bg-[#111] p-3 flex justify-between items-center rounded-xl border border-white/10">
                    <div class="flex-1 px-2">
                        <h4 class="font-bold text-sm text-white" x-text="item.name"></h4>
                        <span class="text-[#D4AF37] text-xs font-bold" x-text="item.price + ' SR'"></span>
                    </div>
                    <button @click="toggleLike(item)" class="text-red-500 bg-red-500/10 px-3 py-2 rounded text-xs font-bold border border-red-500/20 active:scale-95 transition">حذف</button>
                </div>
            </template>
        </div>

        <button x-show="likes.length > 0" @click="copyOrder()" class="w-full bg-gradient-to-r from-[#D4AF37] to-yellow-600 text-black font-black py-4 rounded-xl text-lg shadow-[0_0_20px_rgba(212,175,55,0.3)] active:scale-95 transition" x-text="t('copy_order')"></button>
    </div>

    <div class="fixed bottom-0 w-full glass-nav px-4 py-3 z-[150]">
        <div class="flex justify-between items-center max-w-md mx-auto">
            <button @click="view = 'home'" :class="view === 'home' ? 'text-[#D4AF37]' : 'text-gray-500'" class="flex flex-col items-center gap-1 w-1/4">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 3l9 7.5v10.5h-6v-6h-6v6h-6v-10.5z"/></svg>
                <span class="text-[10px] font-bold" x-text="t('nav_home')"></span>
            </button>
            <button @click="view = 'menu'" :class="view === 'menu' ? 'text-[#D4AF37]' : 'text-gray-500'" class="flex flex-col items-center gap-1 w-1/4">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"></path></svg>
                <span class="text-[10px] font-bold" x-text="t('nav_menu')"></span>
            </button>
            <button @click="view = 'explore'" :class="view === 'explore' ? 'text-[#D4AF37]' : 'text-gray-500'" class="flex flex-col items-center gap-1 w-1/4">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <span class="text-[10px] font-bold" x-text="t('nav_explore')"></span>
            </button>
            <button @click="view = 'likes'" :class="view === 'likes' ? 'text-[#D4AF37]' : 'text-gray-500'" class="flex flex-col items-center gap-1 relative w-1/4">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                <span x-show="likes.length > 0" class="absolute -top-1 right-2 bg-red-600 text-white text-[10px] font-bold w-4 h-4 rounded-full flex items-center justify-center" x-text="likes.length"></span>
                <span class="text-[10px] font-bold" x-text="t('nav_likes')"></span>
            </button>
        </div>
    </div>

    <audio id="sfx-pop" src="https://actions.google.com/sounds/v1/ui/click.ogg" preload="none"></audio>

    <script>
        function taksimApp() {
            return {
                isLoading: true,
                hasError: false,
                view: 'home', 
                currentLang: 'ar',
                currentBranch: 'alshati', // افتراضي
                showQRModal: false,
                
                allRawData: [], 
                activeMenuItems: [],
                activeExploreItems: [],
                heroOffers: [],
                heroIdx: 0,
                heroInterval: null,
                syncInterval: null,
                
                // قاموس ثابت محمي للصور
                hardcodedCategoryImages: {
                    'TP-280': 'https://cdn.phototourl.com/free/2026-04-06-3733ce3c-98f1-468c-b546-0a760efadfb4.png',
                    'TP-281': 'https://cdn.phototourl.com/free/2026-04-06-f989270f-bb00-4e3f-a5e8-39e299f2d567.png',
                    'TP-282': 'https://cdn.phototourl.com/free/2026-04-06-5ace665d-db21-486a-91fd-d54d5f207e39.png',
                    'TP-283': 'https://cdn.phototourl.com/free/2026-04-06-2a935872-3653-4ba7-a1f0-b2990b5451f7.png',
                    'TP-284': 'https://cdn.phototourl.com/free/2026-04-06-820b7c2f-2cc5-4e72-93c0-64f6988cb3cd.png',
                    'TP-285': 'https://cdn.phototourl.com/member/2026-04-06-5ead7e5d-9de6-45f7-9bf8-39f2db46ee8d.png',
                    'TP-286': 'https://cdn.phototourl.com/member/2026-04-06-ecd46992-c928-417f-84c1-b642b162e8ae.png',
                    'TP-287': 'https://cdn.phototourl.com/member/2026-04-06-402eb5e5-b124-4360-8b8a-303d1ff36669.png',
                    'TP-288': 'https://cdn.phototourl.com/member/2026-04-06-54fa98e0-5886-433b-9cf1-adae30f16ead.png',
                    'TP-289': 'https://cdn.phototourl.com/member/2026-04-06-38b8abf9-8d60-45ed-9e75-46e9e4b82a46.png',
                    'TP-290': 'https://cdn.phototourl.com/member/2026-04-06-923f654d-e28d-4e62-85f4-49d2016cd7cd.png',
                    'TP-291': 'https://cdn.phototourl.com/member/2026-04-06-d8501444-5ad3-4010-bae6-6962c0f0a9c9.png',
                    'TP-292': 'https://cdn.phototourl.com/member/2026-04-06-9c9f2a5f-d786-41e4-9854-76b0050cb1a9.png',
                    'TP-293': 'https://cdn.phototourl.com/member/2026-04-06-8c5d633f-7e56-4cc3-b1eb-4b26fc5315df.png',

                get isRTL() { return ['ar', 'ur', 'fa', 'he'].includes(this.currentLang); },
                t(key) { const dict = this.uiDict[this.currentLang] || this.uiDict['en']; return dict[key] || this.uiDict['ar'][key] || key; },

                // تهيئة الذاكرة المحلية بأمان تام (حماية ضد الأعطال)
                initLocalStorage() {
                    try {
                        const saved = localStorage.getItem('taksim_likes');
                        if(saved) {
                            const parsed = JSON.parse(saved);
                            if(Array.isArray(parsed)) this.likes = parsed;
                        }
                    } catch (e) {
                        this.likes = [];
                        localStorage.removeItem('taksim_likes');
                    }
                },

                async changeLanguage(isBackgroundSync = false) {
                    if(!isBackgroundSync) {
                        this.isLoading = true;
                        this.hasError = false;
                    }
                    try {
                        const res = await fetch(this.langLinks[this.currentLang] + '&t=' + Date.now());
                        if (!res.ok) throw new Error('Network Issue');
                        
                        const text = await res.text();
                        
                        Papa.parse(text, {
                            header: false, skipEmptyLines: true,
                            complete: (results) => {
                                const rows = results.data.slice(1);
                                
                                let parsedData = rows.map(cols => {
                                    let id = (cols[0] || '').trim();
                                    return {
                                        id: id,
                                        category: (cols[1] || '').trim(),
                                        name: (cols[2] || '').trim(),
                                        price: (cols[3] || '').trim(),
                                        calories: (cols[4] || '').trim(),
                                        description: (cols[5] || '').replace(/\r?\n|\r/g, ' ').trim(),
                                        image: (cols[6] || '').trim(),
                                        almanar: (cols[7] || '').trim(),
                                        aljawhara: (cols[8] || '').trim(),
                                        alshati: (cols[9] || '').trim()
                                    }
                                }).filter(i => i.id && i.id.startsWith('TP-'));

                                if (parsedData.length === 0) throw new Error('No Data Parsed');

                                this.allRawData = parsedData;

                                this.categoryBgs = {};
                                parsedData.forEach(item => {
                                    if(this.hardcodedCategoryImages[item.id]) {
                                        this.categoryBgs[item.category] = this.hardcodedCategoryImages[item.id];
                                    }
                                });

                                this.updateBranchData();
                            },
                            error: () => { if(!isBackgroundSync) this.hasError = true; }
                        });
                    } catch (e) { 
                        console.error('Data Fetch Error:', e); 
                        if(!isBackgroundSync) this.hasError = true;
                        this.isLoading = false;
                    }
                },

                updateBranchData() {
                    let availableItems = this.allRawData.filter(item => {
                        if (this.currentBranch === 'almanar' && item.almanar === 'غير متوفر') return false;
                        if (this.currentBranch === 'aljawhara' && item.aljawhara === 'غير متوفر') return false;
                        if (this.currentBranch === 'alshati' && item.alshati === 'غير متوفر') return false;
                        return true;
                    });

                    // 1. المنيو العادي
                    this.activeMenuItems = availableItems.filter(item => {
                        const numId = parseInt(item.id.replace('TP-', ''));
                        return (numId < 280 || numId > 302) && !['الاستكشاف', 'Explore', 'Keşfet'].includes(item.category);
                    });

                    this.heroOffers = this.activeMenuItems.filter(i => this.targetHeroIds.includes(i.id));

                    // 2. عناصر الاستكشاف وإضافة الفيديو (دعم مباشر لملف الـ MP4)
                    let dbExploreItems = availableItems.filter(i => ['الاستكشاف', 'Explore', 'Keşfet'].includes(i.category));
                    
                    const customVideo = {
                        id: 'custom-vid-1',
                        name: 'أجواء تقسيم بوينت',
                        description: 'شاهد الفخامة والمذاق الأصيل في أروقة مطاعمنا.',
                        price: '',
                        // رابط الـ mp4 الذي رفعته، تم إضافته ليعمل فوراً دون مشاكل CORS
                        image: 'https://drive.google.com/uc?export=download&id=1AbI4yPT8MqLWciJrts2SY66UYkwmmRQm',
                        category: 'استكشاف',
                        isVideo: true,
                        custom: true
                    };
                    
                    const socialCard = {
                        id: 'social-card-1',
                        name: 'تابعونا على المنصات',
                        description: 'كن على إطلاع دائم بآخر العروض والأطباق الجديدة من تقسيم بوينت.',
                        image: 'https://cdn.phototourl.com/free/2026-04-06-d0b6c388-fcdf-40fd-a7dc-56a84b8309a2.png',
                        isSocial: true,
                        custom: true
                    };

                    this.activeExploreItems = [customVideo, ...dbExploreItems, socialCard];

                    const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?branch=' + this.currentBranch;
                    window.history.replaceState({path:newUrl}, '', newUrl);

                    this.startAutoScroll();
                    this.checkDeepLink();
                    this.isLoading = false;
                },

                // حماية تسرب الذاكرة وتنظيف الـ Interval
                startAutoScroll() {
                    if(this.heroInterval) clearInterval(this.heroInterval);
                    
                    this.heroInterval = setInterval(() => {
                        const el = document.getElementById('hero-slider');
                        if(el && el.children.length > 0) {
                            this.heroIdx = (this.heroIdx + 1) % this.heroOffers.length;
                            const targetSlide = document.getElementById('hero-slide-' + this.heroIdx);
                            if(targetSlide) {
                                targetSlide.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                            }
                        }
                    }, 5000);
                },

                // التحديث الآمن
                startBackgroundSync() {
                    if(this.syncInterval) clearInterval(this.syncInterval);
                    this.syncInterval = setInterval(() => { this.changeLanguage(true); }, 60000);
                },

                get normalCategories() {
                    return [...new Set(this.activeMenuItems.map(i => i.category))].filter(c => c !== '');
                },

                getCategoryBg(catName) {
                    return this.categoryBgs[catName] || 'https://images.unsplash.com/photo-1555939594-58d7cb561ad1?w=800';
                },

                getBranchUrl() { return window.location.origin + window.location.pathname + '?branch=' + this.currentBranch; },
                copyBranchUrl() { navigator.clipboard.writeText(this.getBranchUrl()).then(() => alert('تم نسخ رابط الفرع!')); },

                checkDeepLink() {
                    const urlParams = new URLSearchParams(window.location.search);
                    const exploreId = urlParams.get('explore');
                    if(exploreId) {
                        this.view = 'explore';
                        setTimeout(() => {
                            const el = document.getElementById('explore-' + exploreId);
                            if(el) el.scrollIntoView({ behavior: 'auto' });
                        }, 500);
                    }
                },

                isVideo(url) { return url && (url.match(/\.(mp4|webm|ogg)$/i) || url.includes('video') || url.includes('drive.google')); },

                openMenu(cat) {
                    this.view = 'menu';
                    this.scrollToCat(cat);
                },

                scrollToCat(cat) {
                    setTimeout(() => {
                        // حماية لضمان توافق الـ ID مع المعايير (بدون مسافات ورموز خاصة)
                        const safeCatId = btoa(unescape(encodeURIComponent(cat))).replace(/=/g, '');
                        const el = document.getElementById('cat-' + safeCatId);
                        if(el) window.scrollTo({top: el.getBoundingClientRect().top + window.scrollY - 120, behavior: 'smooth'});
                    }, 100);
                },

                get likedItemsList() { return this.likes.map(id => this.allRawData.find(i => i.id === id)).filter(Boolean); },

                toggleLike(item) {
                    const audio = document.getElementById('sfx-pop');
                    if(audio) { audio.volume = 0.3; audio.currentTime = 0; audio.play().catch(e=>{}); }
                    
                    if(this.likes.includes(item.id)) this.likes = this.likes.filter(id => id !== item.id);
                    else this.likes.push(item.id);
                    localStorage.setItem('taksim_likes', JSON.stringify(this.likes));
                },

                isLiked(id) { return this.likes.includes(id); },

                shareExplore(id) {
                    const url = window.location.origin + window.location.pathname + '?branch=' + this.currentBranch + '&explore=' + id;
                    if (navigator.share) navigator.share({ title: 'استكشف هذا من تقسيم بوينت', url: url });
                    else { navigator.clipboard.writeText(url); alert('تم نسخ الرابط!'); }
                },

                copyOrder() {
                    let text = "طلبي من تقسيم بوينت (" + this.t('branch_'+this.currentBranch) + "):\n\n";
                    this.likedItemsList.forEach(item => text += `- ${item.name} | ${item.price} SR\n`);
                    navigator.clipboard.writeText(text).then(() => alert('تم النسخ بنجاح!'));
                },

                initApp() { 
                    this.initLocalStorage(); // تهيئة الذاكرة بشكل آمن
                    
                    const urlParams = new URLSearchParams(window.location.search);
                    const allowedBranches = ['alshati', 'almanar', 'aljawhara'];
                    let b = urlParams.get('branch');
                    if(b && allowedBranches.includes(b)) this.currentBranch = b; // التحقق الأمني للرابط
                    
                    this.changeLanguage(); 
                    this.startBackgroundSync();
                }
            }
        }
    </script>
